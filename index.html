<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="theme-color" content="#0d0d0d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>CRM Dashboard</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;800;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg:      #0d0d0d;
  --bg2:     #141414;
  --bg3:     #1c1c1c;
  --line:    #252525;
  --line2:   #2e2e2e;
  --txt:     #f0f0f0;
  --txt2:    #aaa;
  --txt3:    #444;
  --acc:     #e8ff47;
  --acc-bg:  rgba(232,255,71,.08);
  --acc-bdr: rgba(232,255,71,.25);
  --red:     #ff4757;
  --grn:     #2ed573;
  --blu:     #1e90ff;
  --org:     #ffa502;
  --r:       10px;
  --r2:      14px;
  --m4-bg:   #1c1c1c;
}
body.light {
  --bg:      #f3f3ee;
  --bg2:     #ffffff;
  --bg3:     #eaeae5;
  --line:    #e0e0da;
  --line2:   #d0d0ca;
  --txt:     #111;
  --txt2:    #666;
  --txt3:    #aaa;
  --acc:     #5137dd;
  --acc-bg:  rgba(81,55,221,.12);
  --acc-bdr: rgba(81,55,221,.4);
  --red:     #d93535;
  --grn:     #1a9e50;
  --blu:     #1060cc;
  --org:     #c97800;
  --m4-bg:   #8a8a8a;
}
body.light .m4 .ml { color:#fff }
body.light .m4 .mv { color:#fff }

/* ── ТЕНЬ ТЕКСТА ── */
body {
text-shadow: 0 1px 3px rgba(0,0,0,0.25);
}
body.light {
text-shadow: 0 1px 2px rgba(0,0,0,0.07);
}
/* Убираем тень там, где она мешает */
input, button, svg, img, .logo-sq {
text-shadow: none;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html,body {
height:100%;
background:var(--bg);
color:var(--txt);
font-family:'Golos Text',sans-serif;
font-size:14px;
line-height:1.5;
overflow-x:hidden;
transition:background .2s, color .2s;
}
::-webkit-scrollbar { width:3px; height:3px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--line2); border-radius:2px }

/* ── LAYOUT ── */
#app { display:flex; flex-direction:column; height:100vh }
main { flex:1; overflow-y:auto }
.w {
width:100%;
max-width:720px;
margin:0 auto;
padding:0 16px;
box-sizing:border-box;
}
.scr { display:none; padding:20px 0; animation:up .2s ease }
.scr.on { display:block }
@keyframes up { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── HEADER ── */
header {
background:var(--bg); border-bottom:1px solid var(--line);
position:sticky; top:0; z-index:100; flex-shrink:0;
}
.hdr-inner {
max-width:720px;
margin:0 auto;
padding:0 20px;
height:52px;
display:flex; align-items:center; justify-content:space-between;
}
.hdr-left  { display:flex; align-items:center; gap:8px }
.hdr-right { display:flex; align-items:center; gap:6px }
.logo {
font-family:'Unbounded',sans-serif;
font-size:12px; font-weight:800; letter-spacing:.06em;
display:flex; align-items:center; gap:8px;
cursor:pointer;
}
.logo-sq {
width:22px; height:22px; border-radius:5px;
background:var(--acc);
display:grid; grid-template-columns:1fr 1fr; gap:2px; padding:4px;
}
.logo-sq span { background:#000; border-radius:1px }
.logo-sq span:last-child { opacity:.4 }

.badge-month {
font-size:11px; padding:3px 9px; border-radius:20px;
background:var(--bg3); border:1px solid var(--line2);
color:var(--txt2); font-weight:500;
}
.btn-icon {
width:30px; height:30px; border-radius:50%;
background:var(--bg3); border:1px solid var(--line2);
color:var(--txt2); cursor:pointer;
display:flex; align-items:center; justify-content:center;
transition:border-color .15s, color .15s; flex-shrink:0;
}
.btn-icon:hover { border-color:var(--acc); color:var(--acc) }
.btn-icon svg { width:14px; height:14px; pointer-events:none }
#btn-out:hover { border-color:var(--red); color:var(--red) }

.btn-signin {
display:flex; align-items:center; gap:6px;
padding:6px 13px; border-radius:var(--r);
background:var(--acc); color:#000; border:none;
font-family:'Unbounded',sans-serif;
font-size:9px; font-weight:800; letter-spacing:.06em;
cursor:pointer; transition:opacity .15s; white-space:nowrap;
}
.btn-signin:hover { opacity:.85 }
.btn-signin svg { width:13px; height:13px }

#user-wrap { display:none; align-items:center; gap:7px; font-size:12px; color:var(--txt2) }
#user-avatar { width:28px; height:28px; border-radius:50%; border:1.5px solid var(--line2) }
#user-name { display:none }

.btn-out {
padding:5px 12px; border-radius:var(--r);
background:var(--bg3); border:1px solid var(--line2);
color:var(--txt2); font-family:'Golos Text',sans-serif;
font-size:12px; cursor:pointer; transition:all .15s;
}
.btn-out:hover { border-color:var(--red); color:var(--red) }

/* ── NAV ── */
nav {
background:var(--bg);
border-bottom:1px solid var(--line);
overflow-x:auto; flex-shrink:0;
position:sticky;
top:52px;
z-index:99;
}
nav::-webkit-scrollbar { height:0 }
.nav-inner {
max-width:720px;
margin:0 auto;
padding:0 20px;
display:flex;
}
.tab {
padding:11px 16px; white-space:nowrap;
font-family:'Unbounded',sans-serif;
font-size:15px; font-weight:800; letter-spacing:.03em;
color:var(--txt3); background:none; border:none;
border-bottom:2px solid transparent;
cursor:pointer; transition:color .15s, border-color .15s;
display:flex; align-items:center; gap:5px;
}
.tab:hover { color:var(--txt2) }
.tab.on { color:var(--acc); border-bottom-color:var(--acc) }
.tab-dot { width:5px; height:5px; border-radius:50%; background:currentColor; opacity:.5 }

/* ── NOT AUTH ── */
.gate {
display:flex; flex-direction:column; align-items:center;
justify-content:center; gap:14px; min-height:65vh;
text-align:center; padding:40px 20px;
}
.gate-icon {
width:56px; height:56px; border-radius:50%;
background:var(--bg3); border:1px solid var(--line2);
display:flex; align-items:center; justify-content:center; color:var(--txt3);
}
.gate-icon svg { width:24px; height:24px }
.gate h2 { font-family:'Unbounded',sans-serif; font-size:15px; font-weight:800 }
.gate p  { font-size:13px; color:var(--txt2); line-height:1.7 }
.gate strong { color:var(--acc) }

/* ── SHARED ── */
.sec-title {
font-family:'Unbounded',sans-serif;
font-size:10px; font-weight:800; letter-spacing:.1em;
text-transform:uppercase;
color:var(--acc);
margin-bottom:12px;
display:flex; align-items:center; gap:8px;
}
.sec-title::after { content:''; flex:1; height:1px; background:var(--line) }

.loader {
display:flex; flex-direction:column; align-items:center;
justify-content:center; gap:12px; padding:60px 20px;
color:var(--txt2); font-size:13px;
}
.spin {
width:28px; height:28px;
border:2px solid var(--line2); border-top-color:var(--acc);
border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.err {
background:rgba(255,71,87,.08); border:1px solid rgba(255,71,87,.25);
border-radius:var(--r2); padding:14px; color:var(--red);
font-size:13px; margin-bottom:12px;
}
.empty { text-align:center; padding:48px 20px; color:var(--txt3); font-size:13px }

/* ── ПОДВКЛАДКИ ОТЧЁТА (sticky) ── */
.report-subtabs {
display:flex; justify-content:center; gap:16px; margin-bottom:10px; border-bottom:1px solid var(--line); padding-bottom:4px;
position:sticky; top:0; background:var(--bg); z-index:10;
}
.report-subtab {
padding:6px 0; white-space:nowrap;
font-family:'Unbounded',sans-serif;
font-size:12px; font-weight:800; letter-spacing:.03em;
color:var(--txt3); background:none; border:none;
border-bottom:2px solid transparent;
cursor:pointer; transition:color .15s, border-color .15s;
}
.report-subtab.active {
color:var(--acc); border-bottom-color:var(--acc);
}

/* ── LIQUID GLASS КАРТОЧКИ ── */
.dept-card, .mop, .zp-row {
position:relative;
backdrop-filter: blur(12px) saturate(180%);
-webkit-backdrop-filter: blur(12px) saturate(180%);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 15px 35px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
transition:all 0.2s;
}
body.light .dept-card,
body.light .mop,
body.light .zp-row {
border-color:rgba(0,0,0,0.1);
box-shadow:0 10px 30px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
}
.dept-card::before, .mop::before, .zp-row::before {
content:'';
position:absolute;
inset:0;
border-radius:inherit;
background: linear-gradient(120deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 30%, transparent 70%);
pointer-events:none;
}
.dept-card::after, .mop::after, .zp-row::after {
content:'';
position:absolute;
inset:0;
border-radius:inherit;
background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.2), transparent 50%),
radial-gradient(circle at 80% 80%, rgba(255,255,255,0.15), transparent 50%);
pointer-events:none;
opacity:0.6;
}

/* ── ОТЧЁТ: MOP CARDS ── */
.mops { display:flex; flex-direction:column; gap:8px }
.mop {
border-radius:var(--r2); padding:13px 14px;
background: rgba(var(--rank-r), var(--rank-g), var(--rank-b), 0.15);
}
body.light .mop {
background: rgba(var(--rank-r), var(--rank-g), var(--rank-b), 0.1);
}
.rank-badge {
display:inline-flex; align-items:center; justify-content:center;
width:22px; height:22px; border-radius:50%;
font-family:'Unbounded',sans-serif; font-size:9px; font-weight:900;
flex-shrink:0;
}
.mop-head {
display:flex; align-items:center;
justify-content:space-between; margin-bottom:12px;
}
.mop-head-left { display:flex; align-items:center; gap:7px }
.mop-name {
font-family:'Unbounded',sans-serif;
font-weight:700; font-size:14px; text-transform:uppercase;
}
.mop-info-btn {
width:22px; height:22px; border-radius:50%;
border:1px solid var(--line2); background:var(--bg3);
color:var(--txt2); font-size:11px; font-weight:700;
font-style:italic; font-family:Georgia,serif;
cursor:pointer; display:flex; align-items:center; justify-content:center;
flex-shrink:0; transition:all .15s;
}
.mop-info-btn:hover { border-color:var(--acc); color:var(--acc) }

.mop-mini {
display:grid; grid-template-columns:repeat(3,1fr);
gap:6px; margin-bottom:12px;
}
.mm {
background:rgba(255,255,255,0.05); border-radius:8px;
padding:8px; text-align:center;
backdrop-filter:blur(4px);
}
body.light .mm { background:rgba(0,0,0,0.03); }
.mm .ml { font-size:9px; color:var(--txt2); text-transform:uppercase; letter-spacing:.04em; margin-bottom:3px }
.mm .mv { font-family:'Unbounded',sans-serif; font-size:14px; font-weight:800; color:var(--txt); }

.mop-prog { position:relative; }
.mop-prog-labels {
display:flex; justify-content:space-between;
font-size:10px; margin-bottom:5px;
}
.mop-prog-labels .cur { font-weight:700; }
.mop-prog-labels .end { color:var(--txt2) }
.mop-prog-track {
height:7px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden;
}
.mop-prog-fill {
height:100%; border-radius:4px;
transition:width .7s ease;
}

/* секции в модалке */
.modal-sec { margin-bottom:14px; }
.modal-sec-title {
font-family:'Unbounded',sans-serif;
font-size:9px; font-weight:800; letter-spacing:.1em;
color:var(--acc);
margin-bottom:8px;
display:flex; align-items:center; gap:8px;
}
.modal-sec-title::after { content:''; flex:1; height:1px; background:var(--line2) }
.modal-grid {
display:grid; gap:6px;
grid-template-columns:repeat(auto-fill, minmax(72px, 1fr));
}
.modal-cell {
background:rgba(255,255,255,0.05); border-radius:8px;
padding:8px 6px; text-align:center;
backdrop-filter:blur(4px);
}
body.light .modal-cell { background:rgba(0,0,0,0.03); }
.modal-cell .mc-l {
font-size:9px; color:var(--txt2);
text-transform:uppercase; letter-spacing:.04em; margin-bottom:3px;
}
.modal-cell .mc-v {
font-family:'Unbounded',sans-serif;
font-size:14px; font-weight:800; color:var(--txt);
}
.mop-overlay {
display:none; position:fixed; inset:0;
background:rgba(0,0,0,.75); backdrop-filter:blur(6px);
z-index:500; align-items:center; justify-content:center;
padding:16px;
}
.mop-overlay.open { display:flex; animation:mFade .2s ease }
@keyframes mFade { from{opacity:0} to{opacity:1} }
.mop-modal {
background:rgba(18,18,18,0.55); border:1px solid rgba(255,255,255,0.2);
border-radius:var(--r2); width:100%; max-width:460px;
max-height:86vh; overflow-y:auto;
animation:mUp .22s ease;
backdrop-filter: blur(25px) saturate(180%);
box-shadow:0 20px 60px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
position:relative;
}
@keyframes mUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
body.light .mop-modal { background: rgba(255,255,255,0.55); }
.mop-modal::before {
content:''; position:absolute; inset:0; border-radius:inherit;
background: linear-gradient(120deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.15) 30%, rgba(255,255,255,0.05) 60%, transparent 100%);
pointer-events:none;
}
.mop-modal::after {
content:''; position:absolute; inset:0; border-radius:inherit;
background: radial-gradient(circle at 20% 10%, rgba(255,255,255,0.25), transparent 40%),
radial-gradient(circle at 80% 90%, rgba(255,255,255,0.15), transparent 50%);
pointer-events:none; opacity:.6;
}
.mop-modal-hdr {
background:transparent; backdrop-filter: blur(10px);
display:flex; align-items:center; justify-content:space-between;
padding:13px 16px; border-bottom:1px solid var(--line);
position:sticky; top:0; z-index:1;
}
.mop-modal-title {
display:flex; align-items:center; gap:8px;
font-family:'Unbounded',sans-serif; font-size:11px; font-weight:800;
}
.mop-modal-close {
width:28px; height:28px; border-radius:50%;
border:1px solid var(--line2); background:var(--bg3);
color:var(--txt2); font-size:18px; cursor:pointer;
display:flex; align-items:center; justify-content:center;
transition:all .15s; flex-shrink:0; line-height:1;
}
.mop-modal-close:hover { border-color:var(--red); color:var(--red) }
.mop-modal-body { padding:14px 16px }

.mop-grid4 {
display:grid; grid-template-columns:repeat(4,1fr);
gap:6px; margin-bottom:12px;
}
.m4 { background:rgba(255,255,255,0.05); border-radius:8px; padding:7px; text-align:center }
.m4 .ml { font-size:9px; color:var(--txt2); text-transform:uppercase; letter-spacing:.04em; margin-bottom:2px }
.m4 .mv { font-family:'Unbounded',sans-serif; font-size:12px; font-weight:700 }
.prog-row { display:flex; align-items:center; gap:8px; margin-bottom:12px }
.prog-l { font-size:11px; color:var(--txt2); width:42px; text-align:right; flex-shrink:0 }
.prog-track { flex:1; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden }
.prog-fill { height:100%; border-radius:2px; transition:width .6s ease }
.prog-r { font-size:11px; font-weight:600; width:38px; text-align:right; flex-shrink:0 }
.chips-wrap { display:flex; flex-direction:column; gap:5px }
.chips-row { display:flex; flex-wrap:wrap; gap:5px }
.chip {
font-size:10px; padding:3px 8px; border-radius:6px;
background:rgba(255,255,255,0.05); border:1px solid var(--line);
color:var(--txt2); display:flex; align-items:center; gap:3px;
}
.chip strong { color:var(--txt); font-size:11px }
.chip.c800  { border-color:rgba(30,144,255,.3) }
.chip.c1200 { border-color:rgba(255,165,2,.3) }
@media(max-width:480px) {
.mop-grid4 { grid-template-columns:repeat(2,1fr) }
}

/* ── КАРТОЧКА ОТДЕЛА ── */
.dept-card {
background: rgba(var(--acc-r), var(--acc-g), var(--acc-b), 0.08);
border:1px solid var(--acc-bdr);
border-radius:var(--r2); padding:14px 16px;
margin-bottom:16px;
}
.dept-title {
font-family:'Unbounded',sans-serif;
font-size:10px; font-weight:800; letter-spacing:.1em;
color:var(--acc);
margin-bottom:12px;
display:flex; align-items:center; gap:8px;
}
.dept-title::after { content:''; flex:1; height:1px; background:var(--acc-bdr) }
.dept-row1, .dept-row2 {
display:grid; gap:8px; margin-bottom:8px;
}
.dept-row1 { grid-template-columns:repeat(3,1fr) }
.dept-row2 { grid-template-columns:repeat(3,1fr); margin-bottom:0 }
.dept-cell {
background:rgba(255,255,255,0.05); border-radius:8px;
padding:10px 12px; text-align:center;
backdrop-filter:blur(4px);
}
body.light .dept-cell { background:rgba(0,0,0,0.02); }
.dept-cell .dc-lbl {
font-size:9px; color:var(--txt2);
text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px;
}
.dept-cell .dc-val {
font-family:'Unbounded',sans-serif;
font-size:16px; font-weight:800; letter-spacing:-.02em;
color:var(--txt);
}
.dept-cell.hi .dc-val { color:var(--txt); }

/* ── СПИДОМЕТРЫ ── */
.speedo-grid {
display:grid; grid-template-columns:repeat(3, 1fr);
gap:16px; margin-top:10px;
}
.speedo-item { text-align:center; }
.speedo-svg-container {
position:relative;
width:100%;
max-width:70px;
margin:0 auto;
background: transparent;
backdrop-filter: none;
}
.speedo-svg-container::before,
.speedo-svg-container::after { display: none; }
.speedo-svg-container svg {
width:100%; height:auto; display:block;
filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
}
.speedo-value {
position:absolute; top:45%; left:50%;
transform:translate(-50%, -50%);
font-family:'Unbounded',sans-serif;
font-size:12px; font-weight:900; color:var(--txt); line-height:1;
}
.speedo-visits {
position:absolute; top:70%; left:50%;
transform:translate(-50%, -50%);
font-family:'Golos Text',sans-serif;
font-size:10px; font-weight:500; color:var(--txt2); white-space:nowrap;
}
.speedo-name {
font-family:'Unbounded',sans-serif;
font-size:9px; font-weight:700;
margin-top:4px; text-transform:uppercase; color:var(--txt2);
}
.base-path { fill:none; stroke:rgba(255,255,255,0.15); stroke-width:20; stroke-linecap:round; }
.progress-path { fill:none; stroke-width:20; stroke-linecap:round; stroke:url(#speedGradient); }
@media(max-width:480px) {
.speedo-grid { grid-template-columns:repeat(2,1fr); }
}

/* ── ИТОГИ ── */
.totals-box {
background:rgba(255,255,255,0.05); border:1px solid var(--line2);
border-radius:var(--r2); padding:13px 14px; margin-top:14px;
backdrop-filter:blur(8px);
}
.totals-lbl {
font-family:'Unbounded',sans-serif;
font-size:9px; font-weight:800; letter-spacing:.08em;
color:var(--txt2); margin-bottom:8px;
}
.totals-row { display:flex; flex-wrap:wrap; gap:7px }
.ti {
background:rgba(255,255,255,0.05); border-radius:8px;
padding:7px 11px; min-width:75px;
display:flex; flex-direction:column; gap:2px;
backdrop-filter:blur(4px);
}
.ti .tl { font-size:9px; color:var(--txt2); text-transform:uppercase; letter-spacing:.04em }
.ti .tv { font-family:'Unbounded',sans-serif; font-size:13px; font-weight:700 }

/* ── ДОХОД ── */
.zp-banner {
border-radius:var(--r2); padding:18px;
text-align:center; margin-bottom:16px;

<script>
/* ══ CONFIG ══ */
const CFG = {
  CLIENT_ID: '364532815329-0j1lkobb1v9vcserj6artf64nd95a0la.apps.googleusercontent.com',
  SHEET_ID:  '1DeUsHB_O1SbIMR4p5yd64o_R0yllWvtnyNhjxjhipn8',
};

/* ══ MONTH ══ */
const _now   = new Date();
const SUFFIX = String(_now.getMonth()+1).padStart(2,'0') + String(_now.getFullYear()).slice(-2);
const TODAY  = _now.getDate();
const SHEETS = {
  otchet:      'ОТЧЁТ'   + SUFFIX,
  dohod:       'ЗП'      + SUFFIX,
  grafik:      'ГРАФИКИ' + SUFFIX,
  instruktsii: 'ИНСТРУКЦИИ',
};
document.getElementById('badge-month').textContent = SUFFIX.slice(0,2) + '/' + SUFFIX.slice(2);

/* ══ STATE ══ */
const S = {
  token:null,
  user:null,
  data:{ otchet:null, dohod:null, grafik:null, instruktsii:null },
  reportTab: 'dept'
};

/* ══ THEME ══ */
if (localStorage.getItem('crm_theme') === 'light') document.body.classList.add('light');

function setTheme(light) {
  document.body.classList.toggle('light', light);
  document.getElementById('ico-moon').style.display = light ? 'none' : '';
  document.getElementById('ico-sun').style.display  = light ? '' : 'none';
  localStorage.setItem('crm_theme', light ? 'light' : 'dark');
}
function syncTheme() { setTheme(document.body.classList.contains('light')) }

let _tt;
function toast(msg, type='i') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = type + ' on';
  clearTimeout(_tt); _tt = setTimeout(() => el.className='', 2600);
}

function showScr(id) {
  ['otchet','dohod','grafik','instruktsii'].forEach(t =>
    document.getElementById('scr-'+t).classList.remove('on')
  );
  document.getElementById('scr-'+id)?.classList.add('on');
  const gs = document.getElementById('grafik-sticky');
  if (gs) gs.style.display = id === 'grafik' ? '' : 'none';
}

function num(v) { return parseInt(v)||0 }
function fmtRub(v) {
  const n = parseFloat(String(v||'').replace(/[^\d.,-]/g,'').replace(',','.'));
  return isNaN(n) ? (v||'—') : n.toLocaleString('ru') + ' ₽';
}
function pctClr(p) { return p>=100?'var(--grn)':p>=60?'var(--org)':'var(--red)' }

function rankColor(pos, total) {
  if (total <= 1) return { r:0, g:230, b:90 };
  const t = pos / (total - 1);
  let r, g, b;
  if (t <= 0.5) {
    const f = t * 2;
    r = Math.round(0   + (255 - 0)   * f);
    g = Math.round(230 + (224 - 230) * f);
    b = Math.round(90  + (0   - 90)  * f);
  } else {
    const f = (t - 0.5) * 2;
    r = Math.round(255 + (255 - 255) * f);
    g = Math.round(224 + (40  - 224) * f);
    b = Math.round(0   + (40  - 0)   * f);
  }
  return { r, g, b };
}

function rankStyles(pos, total) {
  const { r, g, b } = rankColor(pos, total);
  const color   = `rgb(${r},${g},${b})`;
  const border  = `rgba(${r},${g},${b},.6)`;
  const badgeBg = `rgba(${r},${g},${b},.25)`;
  return { color, border, badgeBg, r, g, b };
}
function loader() { return `<div class="loader"><div class="spin"></div><span>Загружаем…</span></div>` }

/* ══ МЕДАЛИ ══
   Функция возвращает HTML кнопки медали.
   idx передаётся напрямую как число — никакого ${} внутри строк. */
function medalBtn(idx) {
  const emoji = idx===0 ? '🥇' : idx===1 ? '🥈' : idx===2 ? '🥉' : '';
  if (!emoji) return '';
  return `<button class="medal-btn" onclick="burstConfetti(this,${idx})" title="🎉">${emoji}</button>`;
}

let tokenClient;

function initAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CFG.CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/spreadsheets.readonly https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
    callback: async (resp) => {
      if (resp.error) { toast('Ошибка: '+resp.error, 'e'); return; }
      S.token = resp.access_token;
      sessionStorage.setItem('crm_tok', resp.access_token);
      sessionStorage.setItem('crm_exp', Date.now()+(resp.expires_in-60)*1000);
      await loadUser();
      onLogin();
    },
  });
}

async function loadUser() {
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
      { headers:{ Authorization:'Bearer '+S.token } });
    S.user = await r.json();
    sessionStorage.setItem('crm_user', JSON.stringify(S.user));
    renderUser();
  } catch(e) {}
}

function renderUser() {
  if (!S.user) return;
  if (S.user.picture) document.getElementById('user-avatar').src = S.user.picture;
  if (S.user.name)    document.getElementById('user-name').textContent = S.user.name.split(' ')[0];
  document.getElementById('user-wrap').style.display = 'flex';
}

function onLogin() {
  document.getElementById('btn-login').style.display = 'none';
  document.getElementById('btn-out').style.display   = '';
  document.getElementById('main-nav').style.display  = 'flex';
  const ls = document.getElementById('scr-login');
  ls.classList.remove('on'); ls.style.display = 'none';
  goTab('otchet');
  toast('Добро пожаловать!', 's');
}

function onLogout() {
  if (S.token) google.accounts.oauth2.revoke(S.token, ()=>{});
  S.token=null; S.user=null;
  S.data = { otchet:null, dohod:null, grafik:null, instruktsii:null };
  ['crm_tok','crm_exp','crm_user'].forEach(k => sessionStorage.removeItem(k));
  document.getElementById('user-wrap').style.display = 'none';
  document.getElementById('btn-out').style.display   = 'none';
  document.getElementById('btn-login').style.display = '';
  document.getElementById('main-nav').style.display  = 'none';
  ['otchet','dohod','grafik','instruktsii'].forEach(t => {
    const s = document.getElementById('scr-'+t);
    s.classList.remove('on'); s.style.display = '';
  });
  const ls = document.getElementById('scr-login');
  ls.style.display=''; ls.classList.add('on');
  toast('Вы вышли');
}

function tryRestore() {
  const tok = sessionStorage.getItem('crm_tok');
  const exp = parseInt(sessionStorage.getItem('crm_exp')||'0');
  if (!tok || exp <= Date.now()) {
    ['crm_tok','crm_exp','crm_user'].forEach(k => sessionStorage.removeItem(k));
    return false;
  }
  S.token = tok;
  const u = sessionStorage.getItem('crm_user');
  if (u) { S.user = JSON.parse(u); renderUser(); }
  onLogin();
  return true;
}

async function api(sheet, range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CFG.SHEET_ID}/values/`
            + encodeURIComponent(sheet+'!'+range);
  const r = await fetch(url, { headers:{ Authorization:'Bearer '+S.token } });
  if (!r.ok) {
    const e = await r.json();
    const msg = e.error?.message || r.statusText;
    if (r.status===401 || r.status===403 || msg.includes('insufficient')) {
      ['crm_tok','crm_exp','crm_user'].forEach(k => sessionStorage.removeItem(k));
      S.token=null; onLogout(); toast('Сессия истекла — войдите снова','e');
      throw new Error('auth');
    }
    throw new Error(msg);
  }
  return (await r.json()).values || [];
}

function goTab(tab) {
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.tab===tab));
  showScr(tab);
  loadTab(tab);
}

async function loadTab(tab) {
  if (S.data[tab]) return;
  const el = document.getElementById('c-'+tab);
  if (el) el.innerHTML = loader();
  try {
    if      (tab==='otchet')      S.data.otchet      = await api(SHEETS.otchet,      'A1:Z15');
    else if (tab==='dohod')       S.data.dohod        = await api(SHEETS.dohod,        'A1:B13');
    else if (tab==='grafik')      S.data.grafik       = await api(SHEETS.grafik,      'A1:AI25');
    else if (tab==='instruktsii') S.data.instruktsii  = await api(SHEETS.instruktsii, 'A1:C200');
    renderTab(tab);
  } catch(e) {
    if (e.message!=='auth' && el)
      el.innerHTML = `<div class="err">Ошибка: ${e.message}</div>`;
  }
}

function reloadCurrent() {
  const tab = document.querySelector('.tab.on')?.dataset.tab || 'otchet';
  if (tab === 'grafik') _schedWeek = null;
  S.data[tab] = null;
  loadTab(tab).then(() => toast('Обновлено','s'));
}

function renderTab(tab) {
  if      (tab==='otchet')      renderOtchet();
  else if (tab==='dohod')       renderDohod();
  else if (tab==='grafik')      renderGrafik();
  else if (tab==='instruktsii') renderInstruktsii();
}

/* ══ RENDER: ОТЧЁТ ══ */
function renderOtchet() {
  const el  = document.getElementById('c-otchet');
  const raw = S.data.otchet;
  if (!raw || raw.length < 4) { el.innerHTML = '<div class="empty">Нет данных</div>'; return; }

  const mgrRows = raw.slice(3, 12).filter(r => r[0] && r[0].trim());
  const kot     = raw[13] || [];
  const totRow  = raw[14] || [];

  const vis800sum  = raw.slice(3,12).reduce((s,r) => s + num(r[1]), 0) + num(kot[1]);
  const vis1200sum = raw.slice(3,12).reduce((s,r) => s + num(r[2]), 0) + num(kot[2]);
  const allVis     = vis800sum + vis1200sum;
  const planTotal  = num(totRow[3]);

  const mo  = parseInt(SUFFIX.slice(0,2));
  const yr  = 2000 + parseInt(SUFFIX.slice(2,4));
  const dim = new Date(yr, mo, 0).getDate();
  const dp  = (_now.getFullYear()===yr && _now.getMonth()+1===mo) ? _now.getDate()
            : _now > new Date(yr,mo-1,dim) ? dim : null;

  let progOtdel = '—';
  if (dp && planTotal > 0) {
    const target = (planTotal / dim) * dp;
    progOtdel = Math.round(allVis / target * 100) + '%';
  }

  const deptKred = raw.slice(3,12).reduce((s,r) => s + num(r[8])  + num(r[12]), 0) + num(kot[8])  + num(kot[12]);
  const deptNal  = raw.slice(3,12).reduce((s,r) => s + num(r[9])  + num(r[13]), 0) + num(kot[9])  + num(kot[13]);

        progressPath.style.strokeDasharray = `${ease * length * targetPct},${length}`;

    });

/* ══ RENDER: ГРАФИК ══ */
const DOW = ['вс','пн','вт','ср','чт','пт','сб'];
let _schedWeek = null;

function renderGrafik() {
  const el  = document.getElementById('c-grafik');
  const raw = S.data.grafik;
  if (!raw || raw.length < 3) { el.innerHTML = '<div class="empty">Нет данных</div>'; return; }

  const mo  = parseInt(SUFFIX.slice(0,2));
  const yr  = 2000 + parseInt(SUFFIX.slice(2,4));
  const dim = new Date(yr, mo, 0).getDate();

  const allDays = Array.from({length:dim}, (_,i) => {
    const d = i+1;
    return { day:d, dow: DOW[new Date(yr, mo-1, d).getDay()] };
  });

  const weeks = [];
  for (let i = 0; i < allDays.length; i += 7) weeks.push(allDays.slice(i, i+7));

  if (_schedWeek === null) {
    const todayWeek = weeks.findIndex(w => w.some(d => d.day === TODAY));
    _schedWeek = todayWeek >= 0 ? todayWeek : 0;
  }
  _schedWeek = Math.max(0, Math.min(_schedWeek, weeks.length-1));

  const week     = weeks[_schedWeek];
  const weekDays = week.map(d => d.day);

  const hdrs = week.map(d => {
    const isT = d.day === TODAY;
    return `<div class="sched-day-hdr${isT?' today':''}">
      <div class="sd-num">${d.day}</div>
      <div class="sd-dow">${d.dow}</div>
    </div>`;
  }).join('');
  const weekHeader = `<div class="sched-week">${hdrs}</div>`;

  function parseGroup(rows, daysRowIdx) {
    const dRow = raw[daysRowIdx]||[];
    return rows.filter(r => r[0]&&r[0].trim()).map(r => {
      const cells = weekDays.map(dayNum => {
        let colIdx = -1;
        for (let c = 1; c <= 31; c++) {
          if (parseInt(dRow[c]) === dayNum) { colIdx = c; break; }
        }
        return colIdx >= 0 ? (r[colIdx]||'') : '';
      });
      return { name: r[0], cells };
    });
  }

  function buildCards(people) {
    return people.map(p => {
      const cells = p.cells.map((val, wi) => {
        const v   = val.toLowerCase().trim();
        const cls = v==='р'?'dr':v==='в'?'dv':v==='вс'?'dvs':val?'':'empty';
        const isT = week[wi]?.day === TODAY;
        return `<div class="sched-cell ${cls}${isT?' today-col':''}">${val||'·'}</div>`;
      }).join('');
      return `<div class="sched-person">
        <div class="sched-person-name">${p.name}</div>
        <div class="sched-cells">${cells}</div>
      </div>`;
    }).join('');
  }

  const g1title = raw[0]?.[0] || 'Группа 1';
  const g2title = raw[16]?.[0] || 'Группа 2';
  const g1 = parseGroup(raw.slice(3,13),  1);
  const g2 = parseGroup(raw.slice(19,25), 17);

  const wStart = week[0].day;
  const wEnd   = week[week.length-1].day;
  const mName  = new Date(yr, mo-1, 1).toLocaleString('ru',{month:'long'});
  const prevDis = _schedWeek === 0 ? 'disabled' : '';
  const nextDis = _schedWeek === weeks.length-1 ? 'disabled' : '';

  el.innerHTML = `
    <div class="sched-group-title" style="margin-top:4px">${g1title}</div>
    ${buildCards(g1)}
    <div class="sched-group-title">${g2title}</div>
    ${buildCards(g2)}`;

  const stickyEl    = document.getElementById('grafik-sticky');
  const stickyInner = document.getElementById('grafik-sticky-inner');
  if (stickyEl && stickyInner) {
    stickyEl.style.display = '';
    stickyInner.innerHTML = `
      <div class="sched-nav">
        <button class="sched-nav-btn" onclick="schedNav(-1)" ${prevDis}>‹</button>
        <div class="sched-nav-title">${wStart}–${wEnd} ${mName}</div>
        <button class="sched-nav-btn" onclick="schedNav(1)" ${nextDis}>›</button>
      </div>
      ${weekHeader}`;
    const hdr = document.querySelector('header');
    const nav = document.getElementById('main-nav');
    if (hdr && nav) stickyEl.style.top = (hdr.offsetHeight + nav.offsetHeight) + 'px';
  }
}

function schedNav(dir) {
  _schedWeek = (_schedWeek||0) + dir;
  if (S.data.grafik) renderGrafik();
}

/* ══ RENDER: ИНСТРУКЦИИ ══ */
function renderInstruktsii() {
  const el  = document.getElementById('c-instruktsii');
  const raw = S.data.instruktsii;
  if (!raw||!raw.length) { el.innerHTML = '<div class="empty">Нет инструкций</div>'; return; }

  const blocks = [];
  let currentBlock = null;
  let currentSub   = null;

  for (const r of raw) {
    const a = (r[0]||'').trim();
    const b = (r[1]||'').trim();
    const c = (r[2]||'').trim();
    if (!a && !b && !c) continue;

    if (a && !b && !c && a === a.toUpperCase() && a.length > 4) {
      if (currentBlock && !currentSub) {
        currentSub = { title: a, rows: [] };
        currentBlock.subs.push(currentSub);
      } else {
        currentBlock = { title: a, subs: [], rows: [] };
        blocks.push(currentBlock);
        currentSub = null;
      }
      continue;
    }

    if (currentSub) {
      currentSub.rows.push({ status:a, criteria:b, action:c });
    } else if (currentBlock) {
      currentBlock.rows.push({ status:a, criteria:b, action:c });
    } else {
      currentBlock = { title: a||'—', subs:[], rows:[] };
      blocks.push(currentBlock);
      currentBlock.rows.push({ status:a, criteria:b, action:c });
    }
  }

  if (!blocks.length) { el.innerHTML = '<div class="empty">Нет инструкций</div>'; return; }

  function buildTable(rows) {
    const withA = rows.some(r => r.action);
    const cols = withA
      ? ['Статус','Критерии применения','Обязательные действия в CRM']
      : ['Статус','Критерии применения'];
    const ths = cols.map(c => `<th>${c}</th>`).join('');
    const trs = rows.filter(r => r.status||r.criteria).map(r =>
      withA
        ? `<tr><td>${r.status||'—'}</td><td>${r.criteria||'—'}</td><td>${r.action||'—'}</td></tr>`
        : `<tr><td>${r.status||'—'}</td><td>${r.criteria||'—'}</td></tr>`
    ).join('');
    return `<div class="table-scroll"><table class="instr-table"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
  }

  const html = blocks.map((b, i) => {
    const id = `ib-${i}`;
    const bodyContent = b.subs.length
      ? b.subs.map((s, si) => {
          const sid = `is-${i}-${si}`;
          return `<div class="instr-sub" id="${sid}">
            <div class="instr-sub-hdr" onclick="toggleSub('${sid}')">
              <span>${s.title}</span>
              <div class="instr-sub-toggle">+</div>
            </div>
            <div class="instr-sub-body">${buildTable(s.rows)}</div>
          </div>`;
        }).join('')
      : buildTable(b.rows);

    return `<div class="instr-block" id="${id}">
      <div class="instr-hdr" onclick="toggleInstr('${id}')">
        <h3>${b.title}</h3>
        <div class="instr-toggle">+</div>
      </div>
      <div class="instr-body">${bodyContent}</div>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="sec-title">Инструкции (${blocks.length})</div>${html}`;
}

function toggleInstr(id) { document.getElementById(id)?.classList.toggle('open') }
function toggleSub(id)   { document.getElementById(id)?.classList.toggle('open') }

/* ══ КОНФЕТТИ ══ */
function burstConfetti(el, idx) {
  const isGold   = (idx === 0);
  const isSilver = (idx === 1);
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;

  if (isGold) {
    const audio = new Audio('https://actions.google.com/sounds/v1/fireworks/firework_burst.ogg');
    audio.volume = 0.25;
    audio.play().catch(()=>{});

    /* Вспышка только для 1-го места */
    const flash = document.createElement('div');
    flash.style.cssText = `
      position:fixed; left:${cx}px; top:${cy}px;
      width:20px; height:20px; border-radius:50%;
      background:radial-gradient(circle,#fff,#ffd700,#ffae00,transparent);
      transform:translate(-50%,-50%); pointer-events:none;
      z-index:9999; animation:flash 0.4s ease-out forwards;`;
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 400);
  }

  const colors = isGold
    ? ['#FFD700','#FFC300','#FFDF00','#FFF8DC','#FFFFFF']
    : isSilver
      ? ['#C0C0C0','#D8D8D8','#A8A8A8','#E8E8E8','#FFFFFF']
      : ['#e8ff47','#ff4757','#2ed573','#1e90ff','#ffa502'];

  /* 1-е место: большой взрыв; 2-е: средний; 3-е: маленький */
  const count  = isGold ? 140 : isSilver ? 80 : 55;
  const radius = isGold ? 280 : isSilver ? 180 : 130;

  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    const angle = (i / count) * 2 * Math.PI;
    const dist  = radius + (Math.random() - 0.5) * (isGold ? 40 : 20);
    const tx    = Math.cos(angle) * dist;
    const ty    = Math.sin(angle) * dist;
    const size  = isGold ? 6 + Math.random() * 10 : 4 + Math.random() * 6;
    const dur   = isGold ? 0.8 + Math.random() * 0.8 : 0.5 + Math.random() * 0.5;

    piece.style.cssText = `
      position:fixed; left:${cx}px; top:${cy}px;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      pointer-events:none; z-index:9999;
      animation:firework ${dur}s ease-out forwards;
      --tx:${tx}px; --ty:${ty}px;`;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), dur * 1000);
  }

  /* Двойной залп только для 🥇 */
  if (isGold) {
    setTimeout(() => burstConfetti(el, 99), 140);
  }
}

}

);

});

);

/* ══ INIT ══ */
function init() {
  syncTheme();
  function waitGoogle() {
    if (typeof google !== 'undefined' && google.accounts) {
      initAuth();
      if (tryRestore()) {
        document.getElementById('btn-login').style.display = 'none';
      } else {
        document.getElementById('btn-login').style.display = '';
        document.getElementById('scr-login').classList.add('on');
      }
    } else {
      setTimeout(waitGoogle, 100);
    }
  }
  waitGoogle();
}

if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
else init();
