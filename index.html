<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="theme-color" content="#0d0d0d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>CRM Dashboard</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;800;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg:      #0d0d0d;
  --bg2:     #141414;
  --bg3:     #1c1c1c;
  --line:    #252525;
  --line2:   #2e2e2e;
  --txt:     #f0f0f0;
  --txt2:    #aaa;
  --txt3:    #444;
  --acc:     #e8ff47;
  --acc-bg:  rgba(232,255,71,.08);
  --acc-bdr: rgba(232,255,71,.25);
  --red:     #ff4757;
  --grn:     #2ed573;
  --blu:     #1e90ff;
  --org:     #ffa502;
  --r:       10px;
  --r2:      14px;
  --m4-bg:   #1c1c1c;
}
body.light {
  --bg:      #f3f3ee;
  --bg2:     #ffffff;
  --bg3:     #eaeae5;
  --line:    #e0e0da;
  --line2:   #d0d0ca;
  --txt:     #111;
  --txt2:    #666;
  --txt3:    #aaa;
  --acc:     #5137dd;
  --acc-bg:  rgba(81,55,221,.12);
  --acc-bdr: rgba(81,55,221,.4);
  --red:     #d93535;
  --grn:     #1a9e50;
  --blu:     #1060cc;
  --org:     #c97800;
  --m4-bg:   #8a8a8a;
}
body.light .m4 .ml { color:#fff }
body.light .m4 .mv { color:#fff }

/* ── ТЕНЬ ТЕКСТА ТОЛЬКО ДЛЯ СВЕТЛОЙ ТЕМЫ (для имён и сумм) ── */
body.light .zp-n,
body.light .zp-a,
body.light .zp-banner .zv {
  text-shadow: 0 2px 5px rgba(255,255,255,0.6);
}

/* ── ТЕНЬ ТЕКСТА (общая) ── */
body {
  text-shadow: 0 1px 3px rgba(0,0,0,0.25);
}
body.light {
  text-shadow: 0 1px 2px rgba(0,0,0,0.07);
}
/* Убираем тень там, где она мешает */
input, button, svg, img, .logo-sq {
  text-shadow: none;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html,body {
  height:100%;
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--txt);
  font-family:'Golos Text',sans-serif;
  font-size:14px;
  line-height:1.5;
  overflow-x:hidden;
  transition:background .2s, color .2s;
}
::-webkit-scrollbar { width:3px; height:3px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--line2); border-radius:2px }

/* ── LAYOUT ── */
#app {
  display:flex;
  flex-direction:column;
  min-height:100vh;
  position: relative;
  z-index: 10;
}
main { flex:1; overflow-y:auto; position: relative; }
.w {
  width:100%;
  max-width:720px;
  margin:0 auto;
  padding:0 16px;
  box-sizing:border-box;
}
.scr { display:none; padding:0 0 10px 0; animation:up .2s ease }
.scr.on { display:block }
@keyframes up { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── HEADER ── */
header {
  background:var(--bg); border-bottom:1px solid var(--line);
  position:sticky; top:0; z-index:100; flex-shrink:0;
}
.hdr-inner {
  max-width:720px;
  margin:0 auto;
  padding:0 20px;
  height:52px;
  display:flex; align-items:center; justify-content:space-between;
}
.hdr-left  { display:flex; align-items:center; gap:8px }
.hdr-right { display:flex; align-items:center; gap:6px; position:relative; }
.logo {
  font-family:'Unbounded',sans-serif;
  font-size:12px; font-weight:800; letter-spacing:.06em;
  display:flex; align-items:center; gap:8px;
  cursor:pointer;
}
.logo-sq {
  width:22px; height:22px; border-radius:5px;
  background:var(--acc);
  display:grid; grid-template-columns:1fr 1fr; gap:2px; padding:4px;
}
.logo-sq span { background:#000; border-radius:1px }
.logo-sq span:last-child { opacity:.4 }

.badge-month {
  font-size:11px; padding:3px 9px; border-radius:20px;
  background:var(--bg3); border:1px solid var(--line2);
  color:var(--txt2); font-weight:500;
  font-family: 'Unbounded', sans-serif;
  cursor:pointer;
  transition:background .2s, border-color .2s;
}
.badge-month:hover {
  background:var(--acc-bg);
  border-color:var(--acc);
  color:var(--acc);
}
.month-dropdown {
  position:absolute;
  top:100%;
  right:0;
  margin-top:4px;
  background:var(--bg2);
  border:1px solid var(--line2);
  border-radius:var(--r);
  z-index:200;
  min-width:140px;
  display:none;
  flex-direction:column;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}
.month-dropdown button {
  background:none;
  border:none;
  padding:8px 12px;
  text-align:left;
  font-family:'Golos Text',sans-serif;
  font-size:12px;
  color:var(--txt);
  cursor:pointer;
  transition:background .1s;
}
.month-dropdown button:hover {
  background:var(--bg3);
  color:var(--acc);
}
.btn-icon {
  width:30px; height:30px; border-radius:50%;
  background:var(--bg3); border:1px solid var(--line2);
  color:var(--txt2); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:border-color .15s, color .15s; flex-shrink:0;
}
.btn-icon:hover { border-color:var(--acc); color:var(--acc) }
.btn-icon svg { width:14px; height:14px; pointer-events:none }
#btn-out:hover { border-color:var(--red); color:var(--red) }

/* центральная кнопка входа на гейте */
.center-login-btn {
  margin-top: 12px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  border-radius: var(--r);
  background: var(--acc);
  color: #000;
  border: none;
  font-family: 'Unbounded', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .06em;
  cursor: pointer;
  transition: opacity .15s;
  white-space: nowrap;
}
.center-login-btn:hover { opacity: .85; }
.center-login-btn svg { width: 16px; height: 16px; }

#user-wrap { display:none; align-items:center; gap:7px; font-size:12px; color:var(--txt2) }
#user-avatar { width:28px; height:28px; border-radius:50%; border:1.5px solid var(--line2) }
#user-name { display:none }

.btn-out {
  padding:5px 12px; border-radius:var(--r);
  background:var(--bg3); border:1px solid var(--line2);
  color:var(--txt2); font-family:'Golos Text',sans-serif;
  font-size:12px; cursor:pointer; transition:all .15s;
}
.btn-out:hover { border-color:var(--red); color:var(--red) }

/* ── NAV ── */
nav {
  background:var(--bg);
  border-bottom:1px solid var(--line);
  overflow-x:auto; flex-shrink:0;
  position:sticky;
  top:52px;
  z-index:99;
}
nav::-webkit-scrollbar { height:0 }
.nav-inner {
  max-width:720px;
  margin:0 auto;
  padding:0 20px;
  display:flex;
}
.tab {
  padding:11px 16px; white-space:nowrap;
  font-family:'Unbounded',sans-serif;
  font-size:15px; font-weight:800; letter-spacing:.03em;
  color:var(--txt3); background:none; border:none;
  border-bottom:2px solid transparent;
  cursor:pointer; transition:color .15s, border-color .15s;
  display:flex; align-items:center; gap:5px;
}
.tab:hover { color:var(--txt2) }
.tab.on { color:var(--acc); border-bottom-color:var(--acc) }
.tab-dot { width:5px; height:5px; border-radius:50%; background:currentColor; opacity:.5 }

/* ── NOT AUTH (GATE) ── */
.gate {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; min-height:65vh;
  text-align:center; padding:40px 20px;
}
.gate-icon {
  width:56px; height:56px; border-radius:50%;
  background:var(--bg3); border:1px solid var(--line2);
  display:flex; align-items:center; justify-content:center; color:var(--txt3);
}
.gate-icon svg { width:24px; height:24px }
.gate h2 { font-family:'Unbounded',sans-serif; font-size:15px; font-weight:800 }

/* ── SHARED ── */
.sec-title {
  font-family:'Unbounded',sans-serif;
  font-size:10px; font-weight:800; letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--acc);
  margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
}
.sec-title::after { content:''; flex:1; height:1px; background:var(--line) }

.loader {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:12px; padding:60px 20px;
  color:var(--txt2); font-size:13px;
}
.spin {
  width:28px; height:28px;
  border:2px solid var(--line2); border-top-color:var(--acc);
  border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.err {
  background:rgba(255,71,87,.08); border:1px solid rgba(255,71,87,.25);
  border-radius:var(--r2); padding:14px; color:var(--red);
  font-size:13px; margin-bottom:12px;
}
.empty { text-align:center; padding:48px 20px; color:var(--txt3); font-size:13px }

/* ── ПЛАВАЮЩИЕ ПОДВКЛАДКИ ── */
#floating-subtabs,
#floating-dohod-subtabs,
#floating-faq-subtabs {
  display: none;
  position: sticky;
  top: 90px;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  z-index: 90;
  width: 100%;
}
.report-subtabs, .faq-subtabs {
  display:flex; justify-content:center; gap:16px;
  padding:0 0 0px 0;
}
.report-subtab, .faq-subtab {
  padding:6px 0; white-space:nowrap;
  font-family:'Unbounded',sans-serif;
  font-size:12px; font-weight:800; letter-spacing:.03em;
  color:var(--txt3); background:none; border:none;
  border-bottom:2px solid transparent;
  cursor:pointer; transition:color .15s, border-color .15s;
}
.report-subtab.active, .faq-subtab.active {
  color:var(--acc); border-bottom-color:var(--acc);
}

/* ── LIQUID GLASS КАРТОЧКИ ── */
.dept-card, .mop, .zp-row {
  position:relative;
  backdrop-filter: blur(12px) saturate(180%);
  -webkit-backdrop-filter: blur(12px) saturate(180%);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 15px 35px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  transition:all 0.2s;
}
body.light .dept-card,
body.light .mop,
body.light .zp-row {
  border-color:rgba(0,0,0,0.1);
  box-shadow:0 10px 30px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
}
.dept-card::before, .mop::before, .zp-row::before {
  content:'';
  position:absolute;
  inset:0;
  border-radius:inherit;
  background: linear-gradient(120deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 30%, transparent 70%);
  pointer-events:none;
}
.dept-card::after, .mop::after, .zp-row::after {
  content:'';
  position:absolute;
  inset:0;
  border-radius:inherit;
  background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.2), transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(255,255,255,0.15), transparent 50%);
  pointer-events:none;
  opacity:0.6;
}

/* ── ОТЧЁТ: MOP CARDS ── */
.mops { display:flex; flex-direction:column; gap:8px }
.mop {
  border-radius:var(--r2); padding:13px 14px;
  background: rgba(var(--rank-r), var(--rank-g), var(--rank-b), 0.15);
}
body.light .mop {
  background: rgba(var(--rank-r), var(--rank-g), var(--rank-b), 0.1);
}
.rank-badge {
  display:inline-flex; align-items:center; justify-content:center;
  width:22px; height:22px; border-radius:50%;
  font-family:'Unbounded',sans-serif; font-size:9px; font-weight:900;
  flex-shrink:0;
}
.mop-head {
  display:flex; align-items:center;
  justify-content:space-between; margin-bottom:12px;
}
.mop-head-left { display:flex; align-items:center; gap:7px }
.mop-name {
  font-family:'Unbounded',sans-serif;
  font-weight:700; font-size:14px; text-transform:uppercase;
}
.mop-info-btn {
  width:22px; height:22px; border-radius:50%;
  border:1px solid var(--line2); background:var(--bg3);
  color:var(--txt2); font-size:11px; font-weight:700;
  font-style:italic; font-family:Georgia,serif;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .15s;
}
.mop-info-btn:hover { border-color:var(--acc); color:var(--acc) }

.mop-mini {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:6px; margin-bottom:12px;
}
.mm {
  background:rgba(255,255,255,0.05); border-radius:8px;
  padding:8px; text-align:center;
  backdrop-filter:blur(4px);
}
body.light .mm { background:rgba(0,0,0,0.03); }
.mm .ml { font-size:9px; color:var(--txt2); text-transform:uppercase; letter-spacing:.04em; margin-bottom:3px }
.mm .mv { font-family:'Unbounded',sans-serif; font-size:14px; font-weight:800; color:var(--txt); }

.mop-prog { position:relative; }
.mop-prog-labels {
  display:flex; justify-content:space-between;
  font-size:10px; margin-bottom:5px;
}
.mop-prog-labels .cur { font-weight:700; }
.mop-prog-labels .end { color:var(--txt2) }
.mop-prog-track {
  height:7px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden;
}
.mop-prog-fill {
  height:100%; border-radius:4px;
  transition:width .7s ease;
}

/* секции в модалке */
.modal-sec { margin-bottom:14px; }
.modal-sec-title {
  font-family:'Unbounded',sans-serif;
  font-size:9px; font-weight:800; letter-spacing:.1em;
  color:var(--acc);
  margin-bottom:8px;
  display:flex; align-items:center; gap:8px;
}
.modal-sec-title::after { content:''; flex:1; height:1px; background:var(--line2) }
.modal-grid {
  display:grid; gap:6px;
  grid-template-columns:repeat(auto-fill, minmax(72px, 1fr));
}
.modal-cell {
  background:rgba(255,255,255,0.05); border-radius:8px;
  padding:8px 6px; text-align:center;
  backdrop-filter:blur(4px);
}
body.light .modal-cell { background:rgba(0,0,0,0.03); }
.modal-cell .mc-l {
  font-size:9px; color:var(--txt2);
  text-transform:uppercase; letter-spacing:.04em; margin-bottom:3px;
}
.modal-cell .mc-v {
  font-family:'Unbounded',sans-serif;
  font-size:14px; font-weight:800; color:var(--txt);
}
.mop-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.75); backdrop-filter:blur(6px);
  z-index:500; align-items:center; justify-content:center;
  padding:16px;
}
.mop-overlay.open { display:flex; animation:mFade .2s ease }
@keyframes mFade { from{opacity:0} to{opacity:1} }

/* === МОДАЛЬНОЕ ОКНО – исправленный фон === */
.mop-modal {
  background: transparent;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:var(--r2);
  width:100%; max-width:460px;
  display: flex;
  flex-direction: column;
  animation:mUp .22s ease;
  position:relative;
}
body.light .mop-modal {
  border-color: rgba(0,0,0,0.2);
}
.mop-modal-body {
  background:rgba(18,18,18,0.55);
  backdrop-filter: blur(25px) saturate(180%);
  border-radius:inherit;
  overflow-y: auto;
  max-height: 86vh;
  position: relative;
  box-shadow:0 20px 60px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
}
.mop-modal-body::before {
  content:''; position:absolute; inset:0; border-radius:inherit;
  background: linear-gradient(120deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.15) 30%, rgba(255,255,255,0.05) 60%, transparent 100%);
  pointer-events:none;
}
.mop-modal-body::after {
  content:''; position:absolute; inset:0; border-radius:inherit;
  background: radial-gradient(circle at 20% 10%, rgba(255,255,255,0.25), transparent 40%),
              radial-gradient(circle at 80% 90%, rgba(255,255,255,0.15), transparent 50%);
  pointer-events:none; opacity:.6;
}
body.light .mop-modal-body {
  background: rgba(255,255,255,0.55);
}
@keyframes mUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

.mop-modal-hdr {
  background:transparent; backdrop-filter: blur(10px);
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 16px; border-bottom:1px solid var(--line);
  position:sticky; top:0; z-index:2;
}
.mop-modal-title {
  display:flex; align-items:center; gap:8px;
  font-family:'Unbounded',sans-serif; font-size:11px; font-weight:800;
}
.mop-modal-close {
  width:28px; height:28px; border-radius:50%;
  border:1px solid var(--line2); background:var(--bg3);
  color:var(--txt2); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0; line-height:1;
}
.mop-modal-close:hover { border-color:var(--red); color:var(--red) }
.mop-modal-body { padding:14px 16px; }

.mop-grid4 {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:6px; margin-bottom:12px;
}
.m4 { background:rgba(255,255,255,0.05); border-radius:8px; padding:7px; text-align:center }
.m4 .ml { font-size:9px; color:var(--txt2); text-transform:uppercase; letter-spacing:.04em; margin-bottom:2px }
.m4 .mv { font-family:'Unbounded',sans-serif; font-size:12px; font-weight:700 }
.prog-row { display:flex; align-items:center; gap:8px; margin-bottom:12px }
.prog-l { font-size:11px; color:var(--txt2); width:42px; text-align:right; flex-shrink:0 }
.prog-track { flex:1; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden }
.prog-fill { height:100%; border-radius:2px; transition:width .6s ease }
.prog-r { font-size:11px; font-weight:600; width:38px; text-align:right; flex-shrink:0 }
.chips-wrap { display:flex; flex-direction:column; gap:5px }
.chips-row { display:flex; flex-wrap:wrap; gap:5px }
.chip {
  font-size:10px; padding:3px 8px; border-radius:6px;
  background:rgba(255,255,255,0.05); border:1px solid var(--line);
  color:var(--txt2); display:flex; align-items:center; gap:3px;
}
.chip strong { color:var(--txt); font-size:11px }
.chip.c800  { border-color:rgba(30,144,255,.3) }
.chip.c1200 { border-color:rgba(255,165,2,.3) }
@media(max-width:480px) {
  .mop-grid4 { grid-template-columns:repeat(2,1fr) }
}

/* ── КАРТОЧКА ОТДЕЛА ── */
.dept-card {
  background: rgba(var(--acc-r), var(--acc-g), var(--acc-b), 0.08);
  border:1px solid var(--acc-bdr);
  border-radius:var(--r2); padding:14px 16px;
  margin-bottom:16px;
}
.dept-title {
  font-family:'Unbounded',sans-serif;
  font-size:10px; font-weight:800; letter-spacing:.1em;
  color:var(--acc);
  margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
}
.dept-title::after { content:''; flex:1; height:1px; background:var(--acc-bdr) }
.dept-row1, .dept-row2 {
  display:grid; gap:8px; margin-bottom:8px;
}
.dept-row1 { grid-template-columns:repeat(3,1fr) }
.dept-row2 { grid-template-columns:repeat(3,1fr); margin-bottom:0 }
.dept-row3 {
  display:grid; gap:8px; margin-bottom:0;
  grid-template-columns:repeat(3,1fr);
}
.dept-sec-lbl {
  font-family:'Unbounded',sans-serif;
  font-size:8px; font-weight:800; letter-spacing:.08em;
  color:var(--acc); text-transform:uppercase;
  margin:10px 0 6px; padding-left:2px;
}
.mango-wrap {
  border:1px solid var(--line); border-radius:var(--r2);
  overflow:hidden;
}

  left: 0;
  top: 0;

.glitch::after  { color: cyan; }

  opacity: 0.8;
  transform: translate(-2px, 1px);

  opacity: 0.8;
  transform: translate(2px, -1px);
}

  25% { transform: translate(1px, -1px); }
  50% { transform: translate(-1px, 1px); }
  75% { transform: translate(1px, 1px); }
  100% { transform: translate(0, 0); }
}

  0% { opacity: 0; }
  50% { opacity: 1; }
  100% { opacity: 0.8; }

function getMonthName(suffix) {
  const mm = parseInt(suffix.slice(0,2));
  const yy = 2000 + parseInt(suffix.slice(2,4));
  return new Date(yy, mm-1, 1).toLocaleString('ru', { month:'long', year:'numeric' });
}

function getSheetNames(suffix) {
  return {
    otchet:      'ОТЧЁТ'   + suffix,
    dohod:       'ЗП'      + suffix,
    d_otchet:    'Д_ОТЧЁТ' + suffix,
    d_dohod:     'Д_ЗП'    + suffix,
    grafik:      'ГРАФИКИ' + suffix,
    cnvrs:       'CNVRS'   + suffix,
    instruktsii: 'ИНСТРУКЦИИ',
  };
}

function num(v) { return parseInt(v)||0 }
function fmtRub(v) {
  const n = parseFloat(String(v||'').replace(/[^\d.,-]/g,'').replace(',','.'));
  return isNaN(n) ? (v||'—') : n.toLocaleString('ru') + ' ₽';
}
function pctClr(p) { return p>=100?'var(--grn)':p>=60?'var(--org)':'var(--red)' }

function rankColor(pos, total) {
  if (total <= 1) return { r:0, g:230, b:90 };
  const t = pos / (total - 1);
  let r, g, b;
  if (t <= 0.5) {
    const f = t * 2;
    r = Math.round(0   + (255 - 0)   * f);
    g = Math.round(230 + (224 - 230) * f);
    b = Math.round(90  + (0   - 90)  * f);
  } else {
    const f = (t - 0.5) * 2;
    r = Math.round(255 + (255 - 255) * f);
    g = Math.round(224 + (40  - 224) * f);
    b = Math.round(0   + (40  - 0)   * f);
  }
  return { r, g, b };
}

function rankStyles(pos, total) {
  const { r, g, b } = rankColor(pos, total);
  const color   = `rgb(${r},${g},${b})`;
  const border  = `rgba(${r},${g},${b},.6)`;
  const badgeBg = `rgba(${r},${g},${b},.25)`;
  return { color, border, badgeBg, r, g, b };
}

let tokenClient;

function initAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CFG.CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/spreadsheets.readonly https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
    callback: async (resp) => {
      if (resp.error) { toast('Ошибка: '+resp.error, 'e'); return; }
      S.token = resp.access_token;
      sessionStorage.setItem('crm_tok', resp.access_token);
      sessionStorage.setItem('crm_exp', Date.now()+(resp.expires_in-60)*1000);
      await loadUser();
      onLogin();
    },
  });
}

async function loadUser() {
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
      { headers:{ Authorization:'Bearer '+S.token } });
    S.user = await r.json();
    sessionStorage.setItem('crm_user', JSON.stringify(S.user));
    renderUser();
  } catch(e) {}
}

function renderUser() {
  if (!S.user) return;
  if (S.user.picture) document.getElementById('user-avatar').src = S.user.picture;
  if (S.user.name)    document.getElementById('user-name').textContent = S.user.name.split(' ')[0];
  document.getElementById('user-wrap').style.display = 'flex';
}

function onLogin() {
  document.getElementById('btn-out').style.display   = '';
  document.getElementById('main-nav').style.display  = 'flex';
  const ls = document.getElementById('scr-login');
  ls.classList.remove('on'); ls.style.display = 'none';
  goTab('otchet');
  toast('Приветствую, коллега!', 's');
}

function onLogout() {
  if (S.token) google.accounts.oauth2.revoke(S.token, ()=>{});
  S.token=null; S.user=null;
  S.data = { otchet:null, dohod:null, grafik:null, instruktsii:null, d_otchet:null, d_dohod:null, cnvrs:null };
  ['crm_tok','crm_exp','crm_user'].forEach(k => sessionStorage.removeItem(k));
  document.getElementById('user-wrap').style.display = 'none';
  document.getElementById('btn-out').style.display   = 'none';
  document.getElementById('main-nav').style.display  = 'none';
  ['otchet','dohod','grafik','instruktsii'].forEach(t => {
    const s = document.getElementById('scr-'+t);
    s.classList.remove('on'); s.style.display = '';
  });
  const ls = document.getElementById('scr-login');
  ls.style.display=''; ls.classList.add('on');
  toast('Вы вышли');
}

function tryRestore() {
  const tok = sessionStorage.getItem('crm_tok');
  const exp = parseInt(sessionStorage.getItem('crm_exp')||'0');
  if (!tok || exp <= Date.now()) {
    ['crm_tok','crm_exp','crm_user'].forEach(k => sessionStorage.removeItem(k));
    return false;
  }
  S.token = tok;
  const u = sessionStorage.getItem('crm_user');
  if (u) { S.user = JSON.parse(u); renderUser(); }
  onLogin();
  return true;
}

async function api(sheet, range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CFG.SHEET_ID}/values/`
            + encodeURIComponent(sheet+'!'+range);
  const r = await fetch(url, { headers:{ Authorization:'Bearer '+S.token } });
  if (!r.ok) {
    const e = await r.json();
    const msg = e.error?.message || r.statusText;
    if (r.status===401 || r.status===403 || msg.includes('insufficient')) {
      ['crm_tok','crm_exp','crm_user'].forEach(k => sessionStorage.removeItem(k));
      S.token=null; onLogout(); toast('Сессия истекла — войдите снова','e');
      throw new Error('auth');
    }
    if (r.status === 404) throw new Error('NOT_FOUND');
    throw new Error(msg);
  }
  return (await r.json()).values || [];
}

function goTab(tab) {
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.tab===tab));
  showScr(tab);
  loadTab(tab);
}

async function loadTab(tab) {
  const showArchiveMsg = (container, isArchive=true) => {
    if (container) container.innerHTML = `<div class="empty">${isArchive ? 'Информация отсутствует. Данные ушли в архив.' : 'Нет данных'}</div>`;
  };
  if (tab === 'otchet') {
    const el = document.getElementById('c-otchet');
    if (!S.data.otchet) {
      if (el) el.innerHTML = loader();
      try {
        S.data.otchet = await api(SHEETS.otchet, 'A1:Z15');
      } catch(e) {
        if (e.message!=='auth') {
          if (e.message === 'NOT_FOUND') showArchiveMsg(el);
          else if (el) el.innerHTML = `<div class="err">Ошибка: ${e.message}</div>`;
        }
        return;
      }
    }
    if (S.reportTab === 'dozhim' && !S.data.d_otchet) {
      try {
        S.data.d_otchet = await api(SHEETS.d_otchet, 'A1:R20');
      } catch(e) {
        if (e.message !== 'NOT_FOUND') S.data.d_otchet = [];
        else S.data.d_otchet = null;
      }
    }
    if (S.reportTab === 'dept' && !S.data.d_otchet) {
      api(SHEETS.d_otchet, 'A1:R20').then(data => {
        S.data.d_otchet = data;
        if (S.reportTab === 'dept') renderOtchet();
      }).catch(() => { S.data.d_otchet = []; });
    }
    if (!S.data.cnvrs) {
      api(SHEETS.cnvrs, 'A1:N40').then(data => {
        S.data.cnvrs = data;
        renderTab('otchet');
      }).catch(() => { S.data.cnvrs = []; });
    }
    renderTab('otchet');
    return;
  }
  if (tab === 'dohod') {
    const el = document.getElementById('c-dohod');
    if (!S.data.dohod) {
      if (el) el.innerHTML = loader();
      try {
        S.data.dohod = await api(SHEETS.dohod, 'A1:B13');
      } catch(e) {
        if (e.message!=='auth') {
          if (e.message === 'NOT_FOUND') showArchiveMsg(el);
          else if (el) el.innerHTML = `<div class="err">Ошибка: ${e.message}</div>`;
        }
        return;
      }
    }
    if (S.dohodTab === 'dozhim' && !S.data.d_dohod) {
      try {
        S.data.d_dohod = await api(SHEETS.d_dohod, 'A1:N20');
      } catch(e) {
        if (e.message !== 'NOT_FOUND') S.data.d_dohod = [];
        else S.data.d_dohod = null;
      }
    }
    renderTab('dohod');
    return;
  }
  if (S.data[tab]) { renderTab(tab); return; }
  const el = document.getElementById('c-'+tab);
  if (el) el.innerHTML = loader();
  try {
    if      (tab==='grafik')      S.data.grafik       = await api(SHEETS.grafik,      'A1:AI25');
    else if (tab==='instruktsii') S.data.instruktsii  = await api(SHEETS.instruktsii, 'A1:C200');
    renderTab(tab);
  } catch(e) {
    if (e.message!=='auth') {
      if (e.message === 'NOT_FOUND') showArchiveMsg(el);
      else if (el) el.innerHTML = `<div class="err">Ошибка: ${e.message}</div>`;
    }
  }
}

function reloadCurrent() {
  const tab = document.querySelector('.tab.on')?.dataset.tab || 'otchet';
  if (tab === 'grafik') _schedWeek = null;
  S.data[tab] = null;
  if (tab === 'otchet') { S.data.d_otchet = null; S.data.cnvrs = null; }
  if (tab === 'dohod') S.data.d_dohod = null;
  loadTab(tab).then(() => toast('Обновлено','s'));
}

function renderTab(tab) {
  if      (tab==='otchet')      renderOtchet();
  else if (tab==='dohod')       renderDohod();
  else if (tab==='grafik')      renderGrafik();
  else if (tab==='instruktsii') renderInstruktsii();
}

      const innerLen = innerPath ? innerPath.getTotalLength() : 0;
      const innerTarget = Math.min((item.convPct || 0) / 100, 1);
      if (innerPath) innerPath.style.strokeDasharray = `0,${innerLen}`;

        if (innerPath) innerPath.style.strokeDasharray = `${ease * innerLen * innerTarget},${innerLen}`;
        if (ease < 1) requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
    });

// ==================== GRAFIK ====================
const DOW = ['вс','пн','вт','ср','чт','пт','сб'];
let _schedWeek = null;

function getWeeksForMonth(year, month) {
  const dim = new Date(year, month + 1, 0).getDate();
  const days = [];
  for (let d = 1; d <= dim; d++) {
    days.push({ day: d, dow: new Date(year, month, d).getDay() });
  }
  const weeks = [];
  let i = 0;
  while (i < days.length) {
    let end = i;
    while (end < days.length && days[end].dow !== 0) end++;
    if (end < days.length) {
      weeks.push(days.slice(i, end + 1));
      i = end + 1;
    } else {
      weeks.push(days.slice(i));
      break;
    }
  }
  return weeks;
}

function parseGroup(rows, daysRow, weekDays) {
  const dRow = daysRow || [];
  return rows.filter(r => r[0] && r[0].trim()).map(r => {
    const cells = weekDays.map(dayNum => {
      let colIdx = -1;
      for (let c = 1; c <= 31; c++) {
        if (parseInt(dRow[c]) === dayNum) { colIdx = c; break; }
      }
      return colIdx >= 0 ? (r[colIdx] || '') : '';
    });
    return { name: r[0], cells };
  });
}

function renderGrafik() {
  const el  = document.getElementById('c-grafik');
  const raw = S.data.grafik;
  if (!raw || raw.length < 3) { el.innerHTML = '<div class="empty">Нет данных</div>'; return; }
  const mo  = parseInt(currentSuffix.slice(0,2));
  const yr  = 2000 + parseInt(currentSuffix.slice(2,4));
  const weeks = getWeeksForMonth(yr, mo - 1);
  if (_schedWeek === null) {
    const today = new Date();
    const todayWeek = weeks.findIndex(w => w.some(d => d.day === today.getDate() && today.getMonth()+1 === mo && today.getFullYear() === yr));
    _schedWeek = todayWeek >= 0 ? todayWeek : 0;
  }
  _schedWeek = Math.max(0, Math.min(_schedWeek, weeks.length-1));
  const week = weeks[_schedWeek];
  const weekDays = week.map(d => d.day);
  const g1pre = parseGroup(raw.slice(3,13), raw[1], weekDays);
  const g2pre = parseGroup(raw.slice(19,25), raw[17], weekDays);
  const crmPeople = g1pre;
  const workerCounts = weekDays.map((_, wi) => crmPeople.filter(p => (p.cells[wi]||'').toLowerCase().trim() === 'р').length);
  const hdrs = week.map((d, wi) => `<div class="sched-day-hdr${d.day === new Date().getDate() && new Date().getMonth()+1 === mo && new Date().getFullYear() === yr ? ' today' : ''}"><div class="sd-num">${d.day}</div><div class="sd-dow">${DOW[d.dow]}</div><div class="sd-workers">${workerCounts[wi]}</div></div>`).join('');
  const weekHeader = `<div class="sched-week">${hdrs}</div>`;
  function buildCards(people) {
    return people.map(p => {
      const cells = p.cells.map((val, wi) => {
        const v = val.toLowerCase().trim();
        const cls = v==='р'?'dr':v==='в'?'dv':v==='вс'?'dvs':val?'':'empty';
        const isT = week[wi]?.day === new Date().getDate() && new Date().getMonth()+1 === mo && new Date().getFullYear() === yr;
        return `<div class="sched-cell ${cls}${isT?' today-col':''}">${val||'·'}</div>`;
      }).join('');
      return `<div class="sched-person"><div class="sched-person-name"><span>${p.name}</span></div><div class="sched-cells">${cells}</div></div>`;
    }).join('');
  }
  const g1title = raw[0]?.[0] || 'Группа 1';
  const g2title = raw[16]?.[0] || 'Группа 2';
  el.innerHTML = `<div class="sched-group-title" style="margin-top:4px">${g1title}</div>${buildCards(g1pre)}<div class="sched-group-title">${g2title}</div>${buildCards(g2pre)}`;
  const stickyEl = document.getElementById('grafik-sticky');
  const stickyInner = document.getElementById('grafik-sticky-inner');
  if (stickyEl && stickyInner) {
    stickyEl.style.display = '';
    const wStart = week[0].day, wEnd = week[week.length-1].day;
    const mName = new Date(yr, mo-1, 1).toLocaleString('ru',{month:'long'});
    const prevDis = _schedWeek === 0 ? 'disabled' : '';
    const nextDis = _schedWeek === weeks.length-1 ? 'disabled' : '';
    stickyInner.innerHTML = `<div class="sched-nav"><button class="sched-nav-btn" onclick="schedNav(-1)" ${prevDis}>‹</button><div class="sched-nav-title">${wStart}–${wEnd} ${mName}</div><button class="sched-nav-btn" onclick="schedNav(1)" ${nextDis}>›</button></div>${weekHeader}`;
    const hdr = document.querySelector('header');
    const nav = document.getElementById('main-nav');
    if (hdr && nav) stickyEl.style.top = (hdr.offsetHeight + nav.offsetHeight) + 'px';
  }
}

    if (aUp.startsWith('НО!') || aUp.startsWith('ЛЮБЫЕ')) return `<tr class="ndz-highlight"><td colspan="2">${text}</td></tr>`;
    if (aUp.startsWith('АЛГОРИТМ ЗВОНКОВ')) return `<tr class="ndz-highlight"><td colspan="2">${text}</td></tr>`;

function burstConfetti(el, idx) {
  const isGold = (idx === 0), isSilver = (idx === 1);
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  if (isGold) {
    const audio = new Audio('https://actions.google.com/sounds/v1/fireworks/firework_burst.ogg');
    audio.volume = 0.25; audio.play().catch(()=>{});
    const flash = document.createElement('div');
    flash.style.cssText = `position:fixed; left:${cx}px; top:${cy}px; width:20px; height:20px; border-radius:50%; background:radial-gradient(circle,#fff,#ffd700,#ffae00,transparent); transform:translate(-50%,-50%); pointer-events:none; z-index:9999; animation:flash 0.4s ease-out forwards;`;
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 400);
  }
  const colors = isGold ? ['#FFD700','#FFC300','#FFDF00','#FFF8DC','#FFFFFF'] : isSilver ? ['#C0C0C0','#D8D8D8','#A8A8A8','#E8E8E8','#FFFFFF'] : ['#e8ff47','#ff4757','#2ed573','#1e90ff','#ffa502'];
  const count = isGold ? 140 : isSilver ? 80 : 55;
  const radius = isGold ? 280 : isSilver ? 180 : 130;
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    const angle = (i / count) * 2 * Math.PI;
    const dist = radius + (Math.random() - 0.5) * (isGold ? 40 : 20);
    const tx = Math.cos(angle) * dist, ty = Math.sin(angle) * dist;
    const size = isGold ? 6 + Math.random() * 10 : 4 + Math.random() * 6;
    const dur = isGold ? 0.8 + Math.random() * 0.8 : 0.5 + Math.random() * 0.5;
    piece.style.cssText = `position:fixed; left:${cx}px; top:${cy}px; width:${size}px; height:${size}px; background:${colors[Math.floor(Math.random() * colors.length)]}; border-radius:${Math.random() > 0.5 ? '50%' : '2px'}; pointer-events:none; z-index:9999; animation:firework ${dur}s ease-out forwards; --tx:${tx}px; --ty:${ty}px;`;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), dur * 1000);
  }
  if (isGold) setTimeout(() => burstConfetti(el, 99), 140);
}

// ==================== MONTH DROPDOWN ====================
function showMonthDropdown() {
  const existing = document.querySelector('.month-dropdown');
  if (existing) existing.remove();
  const dropdown = document.createElement('div');
  dropdown.className = 'month-dropdown';
  const months = [];
  for (let i = 0; i < 4; i++) {
    const d = new Date();
    d.setMonth(d.getMonth() - i);
    const yy = d.getFullYear().toString().slice(-2);
    const mm = (d.getMonth() + 1).toString().padStart(2,'0');
    const suffix = mm + yy;
    months.push({ suffix, name: getMonthName(suffix) });
  }
  months.forEach(m => {
    const btn = document.createElement('button');
    btn.textContent = m.name;
    btn.onclick = () => {
      setCurrentMonth(m.suffix);
      dropdown.remove();
    };
    dropdown.appendChild(btn);
  });
  const badge = document.getElementById('badge-month');
  badge.parentNode.style.position = 'relative';
  badge.parentNode.appendChild(dropdown);
  dropdown.style.display = 'flex';
  const closeDropdown = (e) => {
    if (!dropdown.contains(e.target) && e.target !== badge) {
      dropdown.remove();
      document.removeEventListener('click', closeDropdown);
    }
  };
  setTimeout(() => document.addEventListener('click', closeDropdown), 0);
}

// ==================== BACKGROUND ORBS ====================
(function() {
  const canvas = document.getElementById('bg-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let orbs = [];
  const ORB_COUNT = 20;
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  class Orb {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.baseRadius = 60 + Math.random() * 120;
      this.radius = 0;
      this.alpha = 0;
      this.vx = (Math.random() - 0.5) * 0.5;
      this.vy = (Math.random() - 0.5) * 0.5;
    }
    update() {
      this.x += this.vx; this.y += this.vy;
      if (this.alpha < 1) this.alpha += 0.01;
      if (this.radius < this.baseRadius) this.radius += this.baseRadius * 0.02;
      if (this.x < -500 || this.x > canvas.width + 500 || this.y < -500 || this.y > canvas.height + 500) this.reset();
    }
    draw() {
      const isLight = document.body.classList.contains('light');
      let color = isLight ? "232, 255, 71" : "50, 0, 85";
      const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
      gradient.addColorStop(0, `rgba(${color}, ${0.35 * this.alpha})`);
      gradient.addColorStop(1, `rgba(${color}, 0)`);
      ctx.fillStyle = gradient;
      ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
    }
  }
  for (let i = 0; i < ORB_COUNT; i++) orbs.push(new Orb());
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    orbs.forEach(o => { o.update(); o.draw(); });
    requestAnimationFrame(animate);
  }
  animate();
})();

// ==================== GLITCH ANIMATION ====================
(function() {
  const el = document.getElementById('author');
  if (!el) return;
  function triggerGlitch() {
    const mode = Math.random();
    el.classList.add('active');
    if (mode < 0.33) el.classList.add('shake');
    else if (mode < 0.66) el.classList.add('flash');
    else el.style.color = Math.random() > 0.5 ? '#ff0040' : '#00eaff';
    setTimeout(() => { el.classList.remove('active', 'shake', 'flash'); el.style.color = ''; }, 300 + Math.random() * 500);
  }
  function loop() { triggerGlitch(); setTimeout(loop, 6000 + Math.random() * 4000); }
  setTimeout(loop, 3000);
})();
