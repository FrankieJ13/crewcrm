<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="theme-color" content="#0d0d0d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>CRM Dashboard</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;800;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet"/>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
html, body {
  touch-action: pan-x pan-y;
}
:root {
  --bg:      #0d0d0d;
  --bg2:     #141414;
  --bg3:     #1c1c1c;
  --line:    #252525;
  --line2:   #2e2e2e;
  --txt:     #f0f0f0;
  --txt2:    #aaa;
  --txt3:    #444;
  --acc:     #e8ff47;
  --acc-bg:  rgba(232,255,71,.08);
  --acc-bdr: rgba(232,255,71,.25);
  --red:     #ff4757;
  --grn:     #2ed573;
  --blu:     #1e90ff;
  --org:     #ffa502;
  --r:       10px;
  --r2:      14px;
  --m4-bg:   #1c1c1c;
}
body.light {
  --bg:      #f3f3ee;
  --bg2:     #ffffff;
  --bg3:     #eaeae5;
  --line:    #e0e0da;
  --line2:   #d0d0ca;
  --txt:     #111;
  --txt2:    #666;
  --txt3:    #aaa;
  --acc:     #5137dd;
  --acc-bg:  rgba(81,55,221,.12);
  --acc-bdr: rgba(81,55,221,.4);
  --red:     #d93535;
  --grn:     #1a9e50;
  --blu:     #1060cc;
  --org:     #c97800;
  --m4-bg:   #8a8a8a;
}
body.light .m4 .ml { color:#fff }
body.light .m4 .mv { color:#fff }
body.light .zp-n,
body.light .zp-a,
body.light .zp-banner .zv {
  text-shadow: 0 2px 5px rgba(255,255,255,0.6);
}
body {
  text-shadow: 0 1px 3px rgba(0,0,0,0.25);
}
body.light {
  text-shadow: 0 1px 2px rgba(0,0,0,0.07);
}
input, button, svg, img, .logo-sq {
  text-shadow: none;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html,body {
  height:100%;
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--txt);
  font-family:'Golos Text',sans-serif;
  font-size:14px;
  line-height:1;
  overflow-x:hidden;
  transition:background .2s, color .2s;
}
::-webkit-scrollbar { width:3px; height:3px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--line2); border-radius:2px }
#app {
  display:flex;
  flex-direction:column;
  min-height:100vh;
  position: relative;
  z-index: 10;
}
main { flex:1; overflow-y:auto; position: relative; }
.w {
  width:100%;
  max-width:720px;
  margin:0 auto;
  padding:0 16px;
  box-sizing:border-box;
}
.scr { display:none; padding:0 0 10px 0; animation:up .2s ease }
.scr.on { display:block }
@keyframes up { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
header {
  background:var(--bg); border-bottom:1px solid var(--line);
  position:sticky; top:0; z-index:100; flex-shrink:0;
}
.hdr-inner {
  max-width:720px;
  margin:0 auto;
  padding:0 20px;
  height:52px;
  display:flex; align-items:center; justify-content:space-between;
}
.hdr-left  { display:flex; align-items:center; gap:8px }
.hdr-right { display:flex; align-items:center; gap:6px; position:relative; }
.logo {
  font-family:'Unbounded',sans-serif;
  font-size:12px; font-weight:800; letter-spacing:.06em;
  display:flex; align-items:center; gap:8px;
  cursor:pointer;
}
.logo-sq {
  width:22px; height:22px; border-radius:5px;
  background:var(--acc);
  display:grid; grid-template-columns:1fr 1fr; gap:2px; padding:4px;
}
.logo-sq span { background:#000; border-radius:1px }
.logo-sq span:last-child { opacity:.4 }
.badge-month {
  font-size:11px; padding:3px 9px; border-radius:20px;
  background:var(--bg3); border:1px solid var(--line2);
  color:var(--txt2); font-weight:500;
  font-family: 'Unbounded', sans-serif;
  cursor:pointer;
  transition:background .2s, border-color .2s;
}
.badge-month:hover {
  background:var(--acc-bg);
  border-color:var(--acc);
  color:var(--acc);
}
.month-dropdown {
  position:absolute;
  top:100%;
  right:0;
  margin-top:4px;
  background:var(--bg2);
  border:1px solid var(--line2);
  border-radius:var(--r);
  z-index:200;
  min-width:140px;
  display:none;
  flex-direction:column;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}
.month-dropdown button {
  background:none;
  border:none;
  padding:8px 12px;
  text-align:left;
  font-family:'Golos Text',sans-serif;
  font-size:12px;
  color:var(--txt);
  cursor:pointer;
  transition:background .1s;
}
.month-dropdown button:hover {
  background:var(--bg3);
  color:var(--acc);
}
.btn-icon {
  width:30px; height:30px; border-radius:50%;
  background:var(--bg3); border:1px solid var(--line2);
  color:var(--txt2); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:border-color .15s, color .15s; flex-shrink:0;
}
.btn-icon:hover { border-color:var(--acc); color:var(--acc) }
.btn-icon svg { width:14px; height:14px; pointer-events:none }
#btn-out:hover { border-color:var(--red); color:var(--red) }
.center-login-btn {
  margin-top: 12px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  border-radius: var(--r);
  background: var(--acc);
  color: #000;
  border: none;
  font-family: 'Unbounded', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .06em;
  cursor: pointer;
  transition: opacity .15s;
  white-space: nowrap;
}
.center-login-btn:hover { opacity: .85; }
.center-login-btn svg { width: 16px; height: 16px; }
#user-wrap { display:none; align-items:center; gap:7px; font-size:12px; color:var(--txt2) }
#user-avatar { width:28px; height:28px; border-radius:50%; border:1.5px solid var(--line2) }
#user-name { display:none }
.btn-out {
  padding:5px 12px; border-radius:var(--r);
  background:var(--bg3); border:1px solid var(--line2);
  color:var(--txt2); font-family:'Golos Text',sans-serif;
  font-size:12px; cursor:pointer; transition:all .15s;
}
.btn-out:hover { border-color:var(--red); color:var(--red) }
nav {
  background:var(--bg);
  border-bottom:1px solid var(--line);
  overflow-x:auto; flex-shrink:0;
  position:sticky;
  top:52px;
  z-index:99;
}
nav::-webkit-scrollbar { height:0 }
.nav-inner {
  max-width:720px;
  margin:0 auto;
  padding:0 20px;
  display:flex;
}
.tab {
  padding:11px 16px; white-space:nowrap;
  font-family:'Unbounded',sans-serif;
  font-size:15px; font-weight:800; letter-spacing:.03em;
  color:var(--txt3); background:none; border:none;
  border-bottom:2px solid transparent;
  cursor:pointer; transition:color .15s, border-color .15s;
  display:flex; align-items:center; gap:5px;
}
.tab:hover { color:var(--txt2) }
.tab.on { color:var(--acc); border-bottom-color:var(--acc) }
.tab-dot { width:5px; height:5px; border-radius:50%; background:currentColor; opacity:.5 }
.gate {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; min-height:65vh;
  text-align:center; padding:40px 20px;
}
.gate-icon {
  width:56px; height:56px; border-radius:50%;
  background:var(--bg3); border:1px solid var(--line2);
  display:flex; align-items:center; justify-content:center; color:var(--txt3);
}
.gate-icon svg { width:24px; height:24px }
.gate h2 { font-family:'Unbounded',sans-serif; font-size:15px; font-weight:800 }
.sec-title {
  font-family:'Unbounded',sans-serif;
  font-size:10px; font-weight:800; letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--acc);
  margin-top:8px; margin-bottom:10px;
  display:flex; align-items:center; gap:8px;
}
.sec-title::after { content:''; flex:1; height:1px; background:var(--line) }
.loader {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:12px; padding:60px 20px;
  color:var(--txt2); font-size:13px;
}
.spin {
  width:28px; height:28px;
  border:2px solid var(--line2); border-top-color:var(--acc);
  border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.err {
  background:rgba(255,71,87,.08); border:1px solid rgba(255,71,87,.25);
  border-radius:var(--r2); padding:14px; color:var(--red);
  font-size:13px; margin-bottom:12px;
}
.empty { text-align:center; padding:48px 20px; color:var(--txt3); font-size:13px }
#floating-subtabs,
#floating-dohod-subtabs,
#floating-faq-subtabs {
  display: none;
  position: sticky;
  top: 90px;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  z-index: 90;
  width: 100%;
}
.report-subtabs, .faq-subtabs {
  display:flex; justify-content:center; gap:16px;
  padding:0 0 0px 0;
}
.report-subtab, .faq-subtab {
  padding:6px 0; white-space:nowrap;
  font-family:'Unbounded',sans-serif;
  font-size:12px; font-weight:800; letter-spacing:.03em;
  color:var(--txt3); background:none; border:none;
  border-bottom:2px solid transparent;
  cursor:pointer; transition:color .15s, border-color .15s;
}
.report-subtab.active, .faq-subtab.active {
  color:var(--acc); border-bottom-color:var(--acc);
}
.dept-card, .mop, .zp-row {
  position:relative;
  backdrop-filter: blur(12px) saturate(180%);
  -webkit-backdrop-filter: blur(12px) saturate(180%);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 15px 35px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  transition:all 0.2s;
}
body.light .dept-card,
body.light .mop,
body.light .zp-row {
  border-color:rgba(0,0,0,0.1);
  box-shadow:0 10px 30px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
}
.dept-card::before, .mop::before, .zp-row::before {
  content:'';
  position:absolute;
  inset:0;
  border-radius:inherit;
  background: linear-gradient(120deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 30%, transparent 70%);
  pointer-events:none;
}
.dept-card::after, .mop::after, .zp-row::after {
  content:'';
  position:absolute;
  inset:0;
  border-radius:inherit;
  background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.2), transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(255,255,255,0.15), transparent 50%);
  pointer-events:none;
  opacity:0.6;
}
.mops { display:flex; flex-direction:column; gap:8px }
.mop {
  border-radius:var(--r2); padding:13px 14px;
  background: rgba(var(--rank-r), var(--rank-g), var(--rank-b), 0.15);
}
body.light .mop {
  background: rgba(var(--rank-r), var(--rank-g), var(--rank-b), 0.1);
}
.rank-badge {
  display:inline-flex; align-items:center; justify-content:center;
  width:22px; height:22px; border-radius:50%;
  font-family:'Unbounded',sans-serif; font-size:9px; font-weight:900;
  flex-shrink:0;
}
.mop-head {
  display:flex; align-items:center;
  justify-content:space-between; margin-bottom:12px;
}
.mop-head-left { display:flex; align-items:center; gap:7px }
.mop-name {
  font-family:'Unbounded',sans-serif;
  font-weight:700; font-size:14px; text-transform:uppercase;
}
.mop-info-btn {
  width:22px; height:22px; border-radius:50%;
  border:1px solid var(--line2); background:var(--bg3);
  color:var(--txt2); font-size:11px; font-weight:700;
  font-style:italic; font-family:Georgia,serif;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .15s;
}
.mop-info-btn:hover { border-color:var(--acc); color:var(--acc) }
.mop-mini {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:6px; margin-bottom:12px;
}
.mm {
  background:rgba(255,255,255,0.05); border-radius:8px;
  padding:8px; text-align:center;
  backdrop-filter:blur(4px);
}
body.light .mm { background:rgba(0,0,0,0.03); }
.mm .ml { font-size:9px; color:var(--txt2); text-transform:uppercase; letter-spacing:.04em; margin-bottom:3px }
.mm .mv { font-family:'Unbounded',sans-serif; font-size:14px; font-weight:800; color:var(--txt); }
.mop-prog { position:relative; }
.mop-prog-labels {
  display:flex; justify-content:space-between;
  font-size:10px; margin-bottom:5px;
}
.mop-prog-labels .cur { font-weight:700; }
.mop-prog-labels .end { color:var(--txt2) }
.mop-prog-track {
  height:7px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden;
}
.mop-prog-fill {
  height:100%; border-radius:4px;
  transition:width .7s ease;
}
.modal-sec { margin-bottom:14px; }
.modal-sec-title {
  font-family:'Unbounded',sans-serif;
  font-size:9px; font-weight:800; letter-spacing:.1em;
  color:var(--acc);
  margin-bottom:8px;
  display:flex; align-items:center; gap:8px;
}
.modal-sec-title::after { content:''; flex:1; height:1px; background:var(--line2) }
.modal-grid {
  display:grid; gap:6px;
  grid-template-columns:repeat(auto-fill, minmax(72px, 1fr));
}
.modal-cell {
  background:rgba(255,255,255,0.05); border-radius:8px;
  padding:8px 6px; text-align:center;
  backdrop-filter:blur(4px);
}
body.light .modal-cell { background:rgba(0,0,0,0.03); }
.modal-cell .mc-l {
  font-size:9px; color:var(--txt2);
  text-transform:uppercase; letter-spacing:.04em; margin-bottom:3px;
}
.modal-cell .mc-v {
  font-family:'Unbounded',sans-serif;
  font-size:14px; font-weight:800; color:var(--txt);
}
.mop-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.75); backdrop-filter:blur(6px);
  z-index:500; align-items:center; justify-content:center;
  padding:16px;
}
.mop-overlay.open { display:flex; animation:mFade .2s ease }
@keyframes mFade { from{opacity:0} to{opacity:1} }
.mop-modal {
  background: transparent;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:var(--r2);
  width:100%; max-width:460px;
  display: flex;
  flex-direction: column;
  animation:mUp .22s ease;
  position:relative;
}
body.light .mop-modal {
  border-color: rgba(0,0,0,0.2);
}
.mop-modal-body {
  background:rgba(18,18,18,0.55);
  backdrop-filter: blur(25px) saturate(180%);
  border-radius: 0 0 var(--r2) var(--r2);
  overflow-y: auto;
  max-height: 86vh;
  position: relative;
  box-shadow:0 20px 60px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
}
.mop-modal-body::before {
  content:''; position:absolute; inset:0; border-radius:inherit;
  background: linear-gradient(120deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.15) 30%, rgba(255,255,255,0.05) 60%, transparent 100%);
  pointer-events:none;
}
.mop-modal-body::after {
  content:''; position:absolute; inset:0; border-radius:inherit;
  background: radial-gradient(circle at 20% 10%, rgba(255,255,255,0.25), transparent 40%),
              radial-gradient(circle at 80% 90%, rgba(255,255,255,0.15), transparent 50%);
  pointer-events:none; opacity:.6;
}
body.light .mop-modal-body {
  background: rgba(255,255,255,0.55);
}
@keyframes mUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.mop-modal-hdr {
  background:var(--bg2); color:var(--txt);
  backdrop-filter: blur(10px);
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 16px; border-bottom:1px solid var(--line);
  position:sticky; top:0; z-index:2;
  border-radius:var(--r2) var(--r2) 0 0;
}
.mop-modal-title {
  display:flex; align-items:center; gap:8px;
  font-family:'Unbounded',sans-serif; font-size:11px; font-weight:800;
}
.mop-modal-close {
  width:28px; height:28px; border-radius:50%;
  border:1px solid var(--line2); background:var(--bg3);
  color:var(--txt2); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; flex-shrink:0; line-height:1;
}
.mop-modal-close:hover { border-color:var(--red); color:var(--red) }
.mop-modal-body { padding:14px 16px; }
.mop-grid4 {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:6px; margin-bottom:12px;
}
.m4 { background:rgba(255,255,255,0.05); border-radius:8px; padding:7px; text-align:center }
.m4 .ml { font-size:9px; color:var(--txt2); text-transform:uppercase; letter-spacing:.04em; margin-bottom:2px }
.m4 .mv { font-family:'Unbounded',sans-serif; font-size:12px; font-weight:700 }
.prog-row { display:flex; align-items:center; gap:8px; margin-bottom:12px }
.prog-l { font-size:11px; color:var(--txt2); width:42px; text-align:right; flex-shrink:0 }
.prog-track { flex:1; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden }
.prog-fill { height:100%; border-radius:2px; transition:width .6s ease }
.prog-r { font-size:11px; font-weight:600; width:38px; text-align:right; flex-shrink:0 }
.chips-wrap { display:flex; flex-direction:column; gap:5px }
.chips-row { display:flex; flex-wrap:wrap; gap:5px }
.chip {
  font-size:10px; padding:3px 8px; border-radius:6px;
  background:rgba(255,255,255,0.05); border:1px solid var(--line);
  color:var(--txt2); display:flex; align-items:center; gap:3px;
}
.chip strong { color:var(--txt); font-size:11px }
.chip.c800  { border-color:rgba(30,144,255,.3) }
.chip.c1200 { border-color:rgba(255,165,2,.3) }
@media(max-width:480px) {
  .mop-grid4 { grid-template-columns:repeat(2,1fr) }
  .mop-mini { grid-template-columns:repeat(2,1fr); }
}
.dept-card {
  background: rgba(var(--acc-r), var(--acc-g), var(--acc-b), 0.08);
  border:1px solid var(--acc-bdr);
  border-radius:var(--r2); padding:14px 16px;
  margin-bottom:16px;
}
.dept-title {
  font-family:'Unbounded',sans-serif;
  font-size:10px; font-weight:800; letter-spacing:.1em;
  color:var(--acc);
  margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
}
.dept-title::after { content:''; flex:1; height:1px; background:var(--acc-bdr) }
.dept-row1, .dept-row2 {
  display:grid; gap:8px; margin-bottom:8px;
}
.dept-row1 { grid-template-columns:repeat(3,1fr) }
.dept-row2 { grid-template-columns:repeat(3,1fr); margin-bottom:0 }
.dept-row3 {
  display:grid; gap:8px; margin-bottom:0;
  grid-template-columns:repeat(3,1fr);
}
.dept-sec-lbl {
  font-family:'Unbounded',sans-serif;
  font-size:8px; font-weight:800; letter-spacing:.08em;
  color:var(--acc); text-transform:uppercase;
  margin:10px 0 6px; padding-left:2px;
}
.mango-wrap {
  border:1px solid var(--line); border-radius:var(--r2);
  overflow:hidden;
}
.mango-table {
  width:100%; border-collapse:collapse; font-size:13px;
}
.mango-table th {
  background:var(--acc); color:#000;
  padding:10px 14px; text-align:left;
  font-family:'Unbounded',sans-serif; font-size:10px;
  font-weight:800; letter-spacing:.06em;
}
.mango-table td {
  padding:10px 14px; border-bottom:1px solid var(--line);
  color:var(--txt);
}
.mango-table tr:nth-child(even) td { background:var(--bg3) }
.mango-table tr:nth-child(odd) td { background:var(--bg2) }
.mango-table tr:last-child td { border-bottom:none }

function num(v) { return parseInt(v)||0 }
function fmtRub(v) {
const n = parseFloat(String(v||’’).replace(/[^\d.,-]/g,’’).replace(’,’,’.’));
return isNaN(n) ? (v||’—’) : n.toLocaleString(‘ru’) + ’ ₽’;

function pctClr(p) {

}

function rankColor(pos, total) {
if (total <= 1) return { r:0, g:230, b:90 };
const t = pos / (total - 1);
let r, g, b;
if (t <= 0.5) {
const f = t * 2;
r = Math.round(0   + (255 - 0)   * f);
g = Math.round(230 + (224 - 230) * f);
b = Math.round(90  + (0   - 90)  * f);
} else {
const f = (t - 0.5) * 2;
r = Math.round(255 + (255 - 255) * f);
g = Math.round(224 + (40  - 224) * f);
b = Math.round(0   + (40  - 0)   * f);
}
return { r, g, b };
}

function rankStyles(pos, total) {
const { r, g, b } = rankColor(pos, total);
const color   = `rgb(${r},${g},${b})`;
const border  = `rgba(${r},${g},${b},.6)`;
const badgeBg = `rgba(${r},${g},${b},.25)`;
return { color, border, badgeBg, r, g, b };
}

/* ══════════════════════════════════════════════════════
НОВАЯ ФУНКЦИЯ: Расчёт ЗП из листов ОТЧЁТ + СТАВКИ
══════════════════════════════════════════════════════

Структура строки из ОТЧЁТ (0-based индексы столбцов):
0  = Имя
1  = Визиты CRM (B)
2  = Визиты ТЛ (C)
8  = Кредит CRM (I)
9  = Наличка CRM (J)
10 = Обмен CRM (K = TRADE-IN)
11 = Комиссия CRM (L)
12 = Кредит ТЛ (M)
13 = Наличка ТЛ (N)
14 = Обмен ТЛ (O = TRADE-IN)
15 = Комиссия ТЛ (P)
16 = Задаток (Q)

Структура СТАВКИ (столбец B, 0-based = индекс 1):
B1  (row 0)  = оклад (15000)
B9  (row 8)  = ставка визит CRM
B10 (row 9)  = ставка кредит CRM
B11 (row 10) = ставка наличка CRM
B12 (row 11) = ставка обмен CRM
B13 (row 12) = ставка комиссия CRM
B15 (row 14) = ставка визит ТЛ
B16 (row 15) = ставка кредит ТЛ
B17 (row 16) = ставка наличка ТЛ
B18 (row 17) = ставка обмен ТЛ
B19 (row 18) = ставка комиссия ТЛ
B21 (row 20) = ставка задаток

Логика визитов:
Чистые визиты = Визиты - (Кредиты + Наличка + Обмен + Комиссия)
(визиты, перетёкшие в сделки, не считаются как “просто визит”)
Чистые визиты не могут быть < 0.

Возвращает объект с детализацией для модалки.
*/
function parseRate(v) {
return parseFloat(String(v||‘0’).replace(/[^\d.,-]/g,’’).replace(’,’,’.’)) || 0;
}

function getRates(stavkiRaw) {
// stavkiRaw — массив строк [[A1,B1],[A2,B2],…], индекс = номер строки - 1
const b = (row) => stavkiRaw[row] ? parseRate(stavkiRaw[row][1]) : 0;
return {
oklad:        b(0),   // B1
crmVis:       b(8),   // B9
crmKred:      b(9),   // B10
crmNal:       b(10),  // B11
crmObmen:     b(11),  // B12
crmKom:       b(12),  // B13
tlVis:        b(14),  // B15
tlKred:       b(15),  // B16
tlNal:        b(16),  // B17
tlObmen:      b(17),  // B18
tlKom:        b(18),  // B19
zadatok:      b(20),  // B21
};
}

function calcSalary(mgrRow, rates, fundShare) {
// fundShare — доля котла на этого менеджера (число ₽), 0 если не участвует
const r = mgrRow;
// Факты
const crmVisRaw  = num(r[1]);
const tlVisRaw   = num(r[2]);
const crmKred    = num(r[8]);
const crmNal     = num(r[9]);
const crmObmen   = num(r[10]);
const crmKom     = num(r[11]);
const tlKred     = num(r[12]);
const tlNal      = num(r[13]);
const tlObmen    = num(r[14]);
const tlKom      = num(r[15]);
const zadatok    = num(r[16]);

// Чистые визиты (без сделок)
const crmSdelki  = crmKred + crmNal + crmObmen + crmKom;
const tlSdelki   = tlKred  + tlNal  + tlObmen  + tlKom;
const crmVisCln  = Math.max(0, crmVisRaw - crmSdelki);
const tlVisCln   = Math.max(0, tlVisRaw  - tlSdelki);

// Начисления CRM
const amtCrmVis   = crmVisCln * rates.crmVis;
const amtCrmKred  = crmKred   * rates.crmKred;
const amtCrmNal   = crmNal    * rates.crmNal;
const amtCrmObmen = crmObmen  * rates.crmObmen;
const amtCrmKom   = crmKom    * rates.crmKom;
const crmTotal    = amtCrmVis + amtCrmKred + amtCrmNal + amtCrmObmen + amtCrmKom;

// Начисления ТЛ
const amtTlVis   = tlVisCln * rates.tlVis;
const amtTlKred  = tlKred   * rates.tlKred;
const amtTlNal   = tlNal    * rates.tlNal;
const amtTlObmen = tlObmen  * rates.tlObmen;
const amtTlKom   = tlKom    * rates.tlKom;
const tlTotal    = amtTlVis + amtTlKred + amtTlNal + amtTlObmen + amtTlKom;

// Задаток
const amtZadatok = zadatok * rates.zadatok;

// Итог
const total = rates.oklad + crmTotal + tlTotal + amtZadatok + fundShare;

return {
// CRM факты
crmVisRaw, crmVisCln, crmKred, crmNal, crmObmen, crmKom,
// CRM суммы
amtCrmVis, amtCrmKred, amtCrmNal, amtCrmObmen, amtCrmKom, crmTotal,
// ТЛ факты
tlVisRaw, tlVisCln, tlKred, tlNal, tlObmen, tlKom,
// ТЛ суммы
amtTlVis, amtTlKred, amtTlNal, amtTlObmen, amtTlKom, tlTotal,
// Прочее
zadatok, amtZadatok,
oklad: rates.oklad,
fundShare,
total,
};
}

/*
Считает котловую сумму и возвращает долю на одного участника.
kotRow — строка КОТЁЛ из листа ОТЧЁТ (14-я строка, индекс 13 в массиве raw).
rates — объект ставок.
fundCount — кол-во участников котла (из USERS, fund=да).
*/
function calcFundShare(kotRow, rates, fundCount) {
if (!kotRow || !fundCount || fundCount <= 0) return 0;
const sal = calcSalary(kotRow, rates, 0);
// Котловая сумма = всё кроме оклада
const fundTotal = sal.crmTotal + sal.tlTotal + sal.amtZadatok;
return fundCount > 0 ? Math.round(fundTotal / fundCount) : 0;
}

/* ══ USERS: читаем колонку D (fund) ══
USERS: A=email, B=name, C=role, D=fund (да/нет)
*/
function getUserFund(row) {

});
return row ? getUserFund(row) : false;
}

let tokenClient;
let refreshTimer = null;

function scheduleTokenRefresh(expiresIn) {
if (refreshTimer) clearTimeout(refreshTimer);
const delay = Math.max((expiresIn - 300) * 1000, 0);
refreshTimer = setTimeout(() => {
if (tokenClient && S.token) {
tokenClient.requestAccessToken({ prompt: ‘’ });
}
refreshTimer = null;
}, delay);
}

if (resp.error) { toast(’Ошибка: ’+resp.error, ‘e’); return; }

},
});
}

S.user = await r.json();
sessionStorage.setItem(‘crm_user’, JSON.stringify(S.user));
renderUser();
if (S.usersData !== null &&
document.getElementById(‘scr-otchet’)?.classList.contains(‘on’) &&
!document.getElementById(‘scr-personal’)?.classList.contains(‘on’)) {
const matched = findUserInSheet();

async function api(sheet, range) {
const url = `https://sheets.googleapis.com/v4/spreadsheets/${CFG.SHEET_ID}/values/`
+ encodeURIComponent(sheet+’!’+range);
const r = await fetch(url, { headers:{ Authorization:’Bearer ’+S.token } });
if (!r.ok) {
const e = await r.json();
const msg = e.error?.message || r.statusText;
if (r.status===401 || r.status===403 || msg.includes(‘insufficient’)) {
[‘crm_tok’,‘crm_exp’,‘crm_user’].forEach(k => sessionStorage.removeItem(k));
S.token=null; onLogout(); toast(‘Сессия истекла — войдите снова’,‘e’);
throw new Error(‘auth’);
}
if (r.status === 404) throw new Error(‘NOT_FOUND’);
throw new Error(msg);
}
return (await r.json()).values || [];
}

// ==================== HELPER: дни в месяце ====================
function getDaysInMonth(suffix) {
const mm = parseInt(suffix.slice(0,2));
const yy = 2000 + parseInt(suffix.slice(2,4));
return new Date(yy, mm, 0).getDate();
}
function getWorkedDays(suffix) {
const mm = parseInt(suffix.slice(0,2));
const yy = 2000 + parseInt(suffix.slice(2,4));
const now = new Date();
const isCurrent = (now.getFullYear() === yy && now.getMonth()+1 === mm);
const daysInMonth = getDaysInMonth(suffix);
if (!isCurrent) return daysInMonth;
return Math.min(now.getDate(), daysInMonth);
}

function getManagerShiftCounts(name, suffix) {
const raw = S.data.grafik;
if (!raw || raw.length < 3) return null;
const mm = parseInt(suffix.slice(0,2));
const yy = 2000 + parseInt(suffix.slice(2,4));
const nameLow = (name||’’).toLowerCase().trim();
const groups = [
{ rows: raw.slice(3, 12),  daysRow: raw[1]  || [] },
{ rows: raw.slice(19, 24), daysRow: raw[17] || [] },
];
let mgrRow = null, daysRow = null;
for (const g of groups) {
const found = g.rows.find(r => (r[0]||’’).toLowerCase().trim() === nameLow);
if (found) { mgrRow = found; daysRow = g.daysRow; break; }
}
if (!mgrRow) return null;
const now = new Date();
const isCurrent = (now.getFullYear() === yy && now.getMonth()+1 === mm);
const today = isCurrent ? now.getDate() : 0;
let total = 0, remaining = 0;
for (let c = 1; c <= 35; c++) {
const dayNum = parseInt(daysRow[c]);
if (!dayNum || dayNum < 1 || dayNum > 31) continue;
const val = (mgrRow[c]||’’).toLowerCase().trim();
if (val === ‘р’) {
total++;
if (!isCurrent || dayNum > today) remaining++;
}
}
return { total, remaining };
}

function computeDailyPlan(plan, fact, progNum, suffix, name) {
const shifts = name ? getManagerShiftCounts(name, suffix) : null;
if (shifts && shifts.total > 0) {
const daysInMonth = getDaysInMonth(suffix);
const worked = getWorkedDays(suffix);
if (worked < daysInMonth && progNum < 100) {
if (shifts.remaining <= 0) return shifts.total > 0 ? Math.ceil(plan / shifts.total) : ‘—’;
const need = plan - fact;
if (need <= 0) return 0;
return Math.ceil(need / shifts.remaining);
}
return shifts.total > 0 ? Math.ceil(plan / shifts.total) : ‘—’;
}
const daysInMonth = getDaysInMonth(suffix);
const worked = getWorkedDays(suffix);
if (worked < daysInMonth && progNum < 100) {
const remainingDays = daysInMonth - worked;
if (remainingDays <= 0) return Math.ceil(plan / daysInMonth);
const need = plan - fact;
if (need <= 0) return 0;
return Math.ceil(need / remainingDays);
}
return Math.ceil(plan / daysInMonth);
}

const days = [];
for (let d = 1; d <= dim; d++) {
days.push({ day: d, dow: new Date(year, month, d).getDay() });
}
const weeks = [];
let i = 0;
while (i < days.length) {
let end = i;
while (end < days.length && days[end].dow !== 0) end++;
if (end < days.length) {
weeks.push(days.slice(i, end + 1));
i = end + 1;
} else {
weeks.push(days.slice(i));
break;
}
}
return weeks;
}

function parseGroup(rows, daysRow, weekDays) {
const dRow = daysRow || [];
return rows.filter(r => r[0] && r[0].trim()).map(r => {
const cells = weekDays.map(dayNum => {
let colIdx = -1;
for (let c = 1; c <= 31; c++) {
if (parseInt(dRow[c]) === dayNum) { colIdx = c; break; }
}
return colIdx >= 0 ? (r[colIdx] || ‘’) : ‘’;
});
return { name: r[0], cells };
});
}

function burstConfetti(el, idx) {
const isGold = (idx === 0), isSilver = (idx === 1);
const rect = el.getBoundingClientRect();
const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
if (isGold) {
const audio = new Audio(‘https://actions.google.com/sounds/v1/fireworks/firework_burst.ogg’);
audio.volume = 0.25; audio.play().catch(()=>{});
const flash = document.createElement(‘div’);
flash.style.cssText = `position:fixed; left:${cx}px; top:${cy}px; width:20px; height:20px; border-radius:50%; background:radial-gradient(circle,#fff,#ffd700,#ffae00,transparent); transform:translate(-50%,-50%); pointer-events:none; z-index:9999; animation:flash 0.4s ease-out forwards;`;
document.body.appendChild(flash);
setTimeout(() => flash.remove(), 400);
}
const colors = isGold ? [’#FFD700’,’#FFC300’,’#FFDF00’,’#FFF8DC’,’#FFFFFF’] : isSilver ? [’#C0C0C0’,’#D8D8D8’,’#A8A8A8’,’#E8E8E8’,’#FFFFFF’] : [’#e8ff47’,’#ff4757’,’#2ed573’,’#1e90ff’,’#ffa502’];
const count = isGold ? 140 : isSilver ? 80 : 55;
const radius = isGold ? 280 : isSilver ? 180 : 130;
for (let i = 0; i < count; i++) {
const piece = document.createElement(‘div’);
const angle = (i / count) * 2 * Math.PI;
const dist = radius + (Math.random() - 0.5) * (isGold ? 40 : 20);
const tx = Math.cos(angle) * dist, ty = Math.sin(angle) * dist;
const size = isGold ? 6 + Math.random() * 10 : 4 + Math.random() * 6;
const dur = isGold ? 0.8 + Math.random() * 0.8 : 0.5 + Math.random() * 0.5;
piece.style.cssText = `position:fixed; left:${cx}px; top:${cy}px; width:${size}px; height:${size}px; background:${colors[Math.floor(Math.random() * colors.length)]}; border-radius:${Math.random() > 0.5 ? '50%' : '2px'}; pointer-events:none; z-index:9999; animation:firework ${dur}s ease-out forwards; --tx:${tx}px; --ty:${ty}px;`;
document.body.appendChild(piece);
setTimeout(() => piece.remove(), dur * 1000);
}
if (isGold) setTimeout(() => burstConfetti(el, 99), 140);
}

// ==================== BACKGROUND ORBS ====================
(function() {
const canvas = document.getElementById(‘bg-canvas’);
if (!canvas) return;
const ctx = canvas.getContext(‘2d’);
let orbs = [];
const ORB_COUNT = 20;
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener(‘resize’, resize);
class Orb {
constructor() { this.reset(); }
reset() {
this.x = Math.random() * canvas.width;
this.y = Math.random() * canvas.height;
this.baseRadius = 60 + Math.random() * 120;
this.radius = 0;
this.alpha = 0;
this.vx = (Math.random() - 0.5) * 0.5;
this.vy = (Math.random() - 0.5) * 0.5;
}
update() {
this.x += this.vx; this.y += this.vy;
if (this.alpha < 1) this.alpha += 0.01;
if (this.radius < this.baseRadius) this.radius += this.baseRadius * 0.02;
if (this.x < -500 || this.x > canvas.width + 500 || this.y < -500 || this.y > canvas.height + 500) this.reset();
}
draw() {
const isLight = document.body.classList.contains(‘light’);
let color = isLight ? “232, 255, 71” : “50, 0, 85”;
const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
gradient.addColorStop(0, `rgba(${color}, ${0.35 * this.alpha})`);
gradient.addColorStop(1, `rgba(${color}, 0)`);
ctx.fillStyle = gradient;
ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
}
}
for (let i = 0; i < ORB_COUNT; i++) orbs.push(new Orb());
function animate() {
ctx.clearRect(0, 0, canvas.width, canvas.height);
orbs.forEach(o => { o.update(); o.draw(); });
requestAnimationFrame(animate);
}
animate();
})();

const originalText = "© Бочаров Ю.С., 2026";
const letters = "日ハミヒーヘホマミムメモヤユヨラリルレロワン0123456789$+-*/=%";
let interval = null;

function startMatrixAnimation() {
    let iteration = 0;
    clearInterval(interval);

    interval = setInterval(() => {
        target.innerText = originalText
            .split("")
            .map((char, index) => {
                if (index < iteration) {
                    return originalText[index];
                }
                if (char === " " || char === ",") return char;
                return letters[Math.floor(Math.random() * letters.length)];
            })
            .join("");

        if (iteration >= originalText.length) {
            clearInterval(interval);
        }

        iteration += 1 / 2;
    }, 60);
}
